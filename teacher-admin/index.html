<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Admin · FEI TeamArt</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ════════════════════════════════════════════════════════════════
     FEI TeamArt · Teacher Admin
     Standalone page for Faye to review student submissions and send
     text + voice feedback. Not linked from student-facing navigation.
     ════════════════════════════════════════════════════════════════ */

  :root {
    --ink: #1a1d2b;
    --ink-soft: rgba(26, 29, 43, 0.65);
    --ink-faint: rgba(26, 29, 43, 0.45);
    --ink-veryfaint: rgba(26, 29, 43, 0.15);
    --paper: #fafaf8;
    --paper-soft: #f5f5f7;
    --gold: #c8a96e;
    --green: #1d9e75;
    --red: #d0483f;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 18px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.10);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.5;
  }

  button { font-family: inherit; cursor: pointer; }
  textarea, input { font-family: inherit; }

  /* ─── Login screen ─────────────────────────────────────────── */

  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    padding: 24px;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 40px 32px;
    text-align: center;
  }

  .login-card.shake { animation: shake 0.4s; }
  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-8px); }
    40%, 60% { transform: translateX(8px); }
  }

  .login-brand {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 28px;
  }
  .login-brand span { font-weight: 500; color: var(--ink-soft); }

  .login-label {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
    text-align: left;
  }

  .login-input {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--ink-veryfaint);
    border-radius: var(--radius-sm);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--ink);
    margin-bottom: 16px;
    outline: none;
  }
  .login-input:focus { border-color: var(--gold); }

  .login-btn {
    width: 100%;
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: var(--radius-sm);
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.4px;
    transition: background 0.15s;
  }
  .login-btn:hover { background: #2c3047; }

  .login-error {
    margin-top: 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--red);
  }

  .login-footer {
    margin-top: 22px;
    font-size: 12px;
    color: var(--ink-faint);
  }

  /* ─── Dashboard layout ─────────────────────────────────────── */

  .dashboard { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--ink);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 24px 18px;
  }

  .sidebar-header {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 32px;
  }
  .sidebar-header span { font-weight: 500; color: rgba(255,255,255,0.55); }

  .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }

  .nav-link {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 11px 12px;
    border-radius: var(--radius-sm);
    transition: background 0.15s, color 0.15s;
  }
  .nav-link:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-link.active { background: rgba(200,169,110,0.16); color: var(--gold); }

  .sidebar-footer {
    border-top: 1px solid rgba(255,255,255,0.12);
    padding-top: 16px;
    margin-top: 16px;
  }

  .sidebar-user {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 10px;
  }
  .sidebar-user strong { color: #fff; }

  .sign-out-btn {
    width: 100%;
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 9px;
    border-radius: var(--radius-sm);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    transition: background 0.15s;
  }
  .sign-out-btn:hover { background: rgba(255,255,255,0.08); }

  .main {
    flex: 1;
    min-width: 0;
    padding: 32px 36px 60px;
  }

  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
  }

  .main-header h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 24px;
  }

  .filter-tabs { display: flex; gap: 6px; background: var(--paper-soft); padding: 4px; border-radius: var(--radius-sm); }

  .tab {
    background: none;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--ink-soft);
    transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: #fff; color: var(--ink); box-shadow: var(--shadow-sm); }

  /* ─── States ────────────────────────────────────────────────── */

  .loading-state, .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-faint);
  }

  .spinner {
    width: 34px; height: 34px;
    border: 3px solid var(--ink-veryfaint);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state-icon { font-size: 32px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; max-width: 320px; }

  /* ─── Student groups + cards ───────────────────────────────── */

  .student-group { margin-bottom: 36px; }

  .student-group-header {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--ink-veryfaint);
  }
  .student-group-header .code-tag {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: var(--ink-faint);
    margin-left: 6px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  .card {
    background: #fff;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: var(--paper-soft);
    object-fit: cover;
    display: block;
  }

  .card-body { padding: 16px; }

  .card-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 14px;
  }

  .card-student-email {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  .card-student-code {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 11px;
    color: var(--ink);
    background: var(--paper-soft);
    border-radius: 6px;
    padding: 2px 8px;
    margin-top: 4px;
  }

  .card-meta {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 3px;
    margin-bottom: 14px;
  }

  .feedback-box {
    background: var(--paper-soft);
    border-radius: var(--radius-sm);
    padding: 12px;
  }

  .feedback-box-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .feedback-textarea {
    width: 100%;
    min-height: 64px;
    resize: vertical;
    border: 1.5px solid var(--ink-veryfaint);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    margin-bottom: 10px;
  }
  .feedback-textarea:focus { border-color: var(--gold); }

  .voice-row { margin-bottom: 12px; }

  .voice-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 6px;
    display: block;
  }

  .voice-file-btn {
    display: inline-block;
    background: #fff;
    border: 1.5px solid var(--ink-veryfaint);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
  }
  .voice-file-btn:hover { border-color: var(--gold); }

  .voice-file-chosen {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-soft);
    background: #fff;
    border-radius: 8px;
    padding: 7px 10px;
    border: 1px solid var(--ink-veryfaint);
  }
  .voice-file-chosen.visible { display: flex; }
  .voice-file-remove {
    background: none; border: none; color: var(--red);
    font-weight: 700; font-size: 12px; margin-left: auto;
  }

  .send-btn {
    width: 100%;
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 12.5px;
    letter-spacing: 0.3px;
    transition: background 0.15s, opacity 0.15s;
  }
  .send-btn:hover { background: #2c3047; }
  .send-btn:disabled { opacity: 0.6; cursor: default; }

  .send-error {
    display: none;
    margin-top: 8px;
    font-size: 12px;
    color: var(--red);
    font-weight: 600;
  }
  .send-error.visible { display: block; }

  .reviewed-banner {
    margin-top: 14px;
    background: rgba(29,158,117,0.1);
    color: var(--green);
    font-weight: 700;
    font-size: 12.5px;
    padding: 10px 12px;
    border-radius: 8px;
  }

  .reviewed-comment {
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--ink-soft);
    background: var(--paper-soft);
    border-radius: 8px;
    padding: 10px 12px;
  }

  /* ─── Mobile ────────────────────────────────────────────────── */

  @media (max-width: 800px) {
    .dashboard { flex-direction: column; }
    .sidebar {
      width: 100%;
      flex-direction: row;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 16px;
      gap: 10px;
    }
    .sidebar-header { margin-bottom: 0; margin-right: auto; }
    .sidebar-nav { flex-direction: row; flex: none; overflow-x: auto; }
    .sidebar-footer {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .sidebar-user { margin-bottom: 0; }
    .sign-out-btn { width: auto; padding: 8px 12px; }
    .main { padding: 24px 18px 48px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card" id="loginCard">
    <div class="login-brand">FEI TeamArt <span>· Teacher Admin</span></div>
    <label class="login-label" for="teacherCodeInput">Enter teacher code</label>
    <input class="login-input" id="teacherCodeInput" type="password" autocomplete="off" placeholder="TEACHER CODE" />
    <button class="login-btn" id="loginBtn">Login →</button>
    <div class="login-error" id="loginError" hidden>Invalid code</div>
    <div class="login-footer">This page is for teachers only.</div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div class="dashboard" id="dashboard" hidden>
  <aside class="sidebar">
    <div class="sidebar-header">FEI TeamArt <span>· Admin</span></div>
    <nav class="sidebar-nav">
      <button class="nav-link active" data-filter="all">📋 All Submissions</button>
      <button class="nav-link" data-filter="reviewed">✅ Reviewed</button>
      <button class="nav-link" data-filter="pending">⏳ Pending Review</button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">Logged in as: <strong id="loggedInAsName">Teacher Faye</strong></div>
      <button class="sign-out-btn" id="signOutBtn">Sign out</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1>Student Submissions</h1>
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="pending">Pending</button>
        <button class="tab" data-filter="reviewed">Reviewed</button>
      </div>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div>Loading submissions…</div>
    </div>

    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-state-icon">🗂️</div>
      <p id="emptyStateMsg">No submissions yet. Students will appear here after they submit their work.</p>
    </div>

    <div id="groupsContainer" hidden></div>
  </main>
</div>

<script>
(function () {
  'use strict';

  // ── Supabase config ──────────────────────────────────────────
  // Same project as core/auth.js. Publishable key is safe to embed in
  // client code by design, but note: it can read/write anything the
  // project's Row Level Security policies allow for the anon role.
  // The "teacher code" login below is a client-side convenience gate
  // only (view-source defeats it) — it does NOT restrict who can call
  // the Supabase REST API with this same key. Real protection for
  // teacher_feedback / teacher-voice must come from RLS policies on
  // the Supabase project itself, not from this page.
  const SUPABASE_URL = 'https://rudztwseatwayhztbarj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1ZHp0d3NlYXR3YXloenRiYXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NTQyOTYsImV4cCI6MjA4NjUzMDI5Nn0.YrPIS26glb-N5JIKspFuzdtp-t32qXAtLoDHwTbLVtk';

  // Every function below is declared inside this same IIFE, so they all
  // already have closure access to the consts above. Also attach them to
  // window — mirrors core/auth.js attaching its config onto window.FEIAuth
  // (global.FEIAuth = { ..., SUPABASE_URL, ... }) — so the config is
  // reachable from outside this file too (console debugging, future
  // scripts on this page). Safe to expose: this is the sb_publishable_
  // key, meant to be public in client code (same key core/auth.js uses).
  window.SUPABASE_URL = SUPABASE_URL;
  window.SUPABASE_KEY = SUPABASE_KEY;

  const SUBMISSIONS_TABLE = 'student_submissions';
  const FEEDBACK_TABLE = 'teacher_feedback';
  const VOICE_BUCKET = 'teacher-voice';

  const TEACHER_CODES = ['TEACHER-FAYE', 'FAYE-00', 'TEACHER-DAWN'];
  const TEACHER_NAMES = {
    'TEACHER-FAYE': 'Teacher Faye',
    'FAYE-00': 'Teacher Faye',
    'TEACHER-DAWN': 'Teacher Dawn'
  };
  const SESSION_KEY = 'fei_teacher_admin_authed';
  const TEACHER_CODE_KEY = 'fei_teacher_admin_code';

  // NOTE on student identity: student_submissions has no student_code
  // column, and there's no way to derive one — student_progress (see
  // core/progress.js) has no user_id column to join against, and
  // FEISubmissions.submit() (core/submissions.js) requires an active
  // Supabase Auth session, so legacy access-code students (JOJO-10 etc.,
  // who sign in with a plain code, no Supabase session) can never submit
  // through this system in the first place. Every row that CAN exist here
  // already carries its real identity directly as user_name/user_email —
  // that's used as-is below, no lookup/matching needed.

  function sbHeaders(extra) {
    return Object.assign({
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + SUPABASE_KEY
    }, extra || {});
  }

  // Plain fetch() has no timeout — if the request hangs (dead network,
  // blocked host, etc.) it never resolves OR rejects, so code sitting on
  // `await fetch(...)` waits forever and the loading spinner never clears.
  // This wraps fetch with an AbortController so a stuck request always
  // eventually rejects and falls into the caller's catch block.
  const FETCH_TIMEOUT_MS = 12000;
  function fetchWithTimeout(url, options) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
    return fetch(url, Object.assign({}, options, { signal: controller.signal }))
      .finally(() => clearTimeout(timer));
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString(undefined, { month: 'long', day: 'numeric' });
  }

  // ── Data loading ─────────────────────────────────────────────
  // Declared before the Login section — showDashboard() (below) can
  // run synchronously during page load (see the alreadyAuthed check),
  // and it reads appState.loaded, so appState must already exist by
  // then or it throws "Cannot access 'appState' before initialization"
  // (TDZ: a const declared later in the same scope isn't usable yet).

  const appState = {
    loaded: false,
    submissions: [],
    feedbackBySubmissionId: new Map(),
    filter: 'all'
  };

  const loadingState = document.getElementById('loadingState');
  const emptyState = document.getElementById('emptyState');
  const emptyStateMsg = document.getElementById('emptyStateMsg');
  const groupsContainer = document.getElementById('groupsContainer');

  // ── Login ─────────────────────────────────────────────────────

  const loginScreen = document.getElementById('loginScreen');
  const loginCard = document.getElementById('loginCard');
  const teacherCodeInput = document.getElementById('teacherCodeInput');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const dashboard = document.getElementById('dashboard');

  function setTeacherNameDisplay(code) {
    const nameEl = document.getElementById('loggedInAsName');
    if (nameEl) nameEl.textContent = TEACHER_NAMES[code] || 'Teacher Faye';
  }

  function tryLogin() {
    const code = (teacherCodeInput.value || '').trim().toUpperCase();
    if (TEACHER_CODES.includes(code)) {
      try {
        sessionStorage.setItem(SESSION_KEY, '1');
        sessionStorage.setItem(TEACHER_CODE_KEY, code);
      } catch (e) {}
      setTeacherNameDisplay(code);
      showDashboard();
    } else {
      loginError.hidden = false;
      loginCard.classList.remove('shake');
      void loginCard.offsetWidth;
      loginCard.classList.add('shake');
    }
  }

  loginBtn.addEventListener('click', tryLogin);
  teacherCodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryLogin();
  });

  document.getElementById('signOutBtn').addEventListener('click', () => {
    try {
      sessionStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(TEACHER_CODE_KEY);
    } catch (e) {}
    dashboard.style.display = 'none';
    loginScreen.style.display = 'flex';
    teacherCodeInput.value = '';
    loginError.hidden = true;
  });

  function showDashboard() {
    loginScreen.style.display = 'none';
    dashboard.style.display = 'flex';
    if (!appState.loaded) loadData();
  }

  let alreadyAuthed = false;
  let storedTeacherCode = null;
  try {
    alreadyAuthed = sessionStorage.getItem(SESSION_KEY) === '1';
    storedTeacherCode = sessionStorage.getItem(TEACHER_CODE_KEY);
  } catch (e) {}
  if (alreadyAuthed) {
    setTeacherNameDisplay(storedTeacherCode);
    showDashboard();
  } else {
    dashboard.style.display = 'none';
    loginScreen.style.display = 'flex';
  }

  async function loadData() {
    // .loading-state sets `display: flex` unconditionally in the author
    // stylesheet (see the CSS block above), which always overrides the
    // browser's default `[hidden] { display: none }` UA rule regardless
    // of selector specificity — so toggling the `hidden` IDL property
    // here was a no-op the whole time. That's the actual bug: the
    // spinner shows real cards fine underneath, but never visually
    // hides. Using style.display directly (inline styles beat the class
    // rule) actually works — same fix already applied to #loginScreen/
    // #dashboard earlier in this file.
    loadingState.style.display = 'flex';
    emptyState.hidden = true;
    groupsContainer.hidden = true;

    // Fallback: if nothing below has hidden the spinner within 5s (an
    // unanticipated hang that even fetchWithTimeout's own 12s abort
    // doesn't cover — e.g. a hang in JSON parsing or rendering, not the
    // network request itself), force it closed rather than leaving the
    // teacher staring at a spinner forever. Cleared in finally below on
    // every normal exit, so it never fires after loadData() has already
    // finished.
    const watchdogTimer = setTimeout(() => {
      console.log('[Admin] Fallback timeout fired — still loading after 5s, forcing spinner off');
      loadingState.style.display = 'none';
      groupsContainer.hidden = true;
      emptyState.hidden = false;
      emptyStateMsg.textContent = 'Could not load — please refresh.';
    }, 5000);

    // The whole body runs inside try/finally so the spinner is
    // GUARANTEED to be hidden when this function exits — success,
    // empty result, or error — no branch can leave it spinning.
    try {
      console.log('[Admin] Starting fetch...');
      const [subsRes, fbRes] = await Promise.all([
        fetchWithTimeout(`${SUPABASE_URL}/rest/v1/${SUBMISSIONS_TABLE}?select=*&order=created_at.desc`, {
          headers: sbHeaders()
        }),
        fetchWithTimeout(`${SUPABASE_URL}/rest/v1/${FEEDBACK_TABLE}?select=*`, {
          headers: sbHeaders()
        })
      ]);

      console.log('[Admin] Response status:', subsRes.status);
      console.log('[Admin] Response ok:', subsRes.ok);

      if (!subsRes.ok) throw new Error('Failed to load submissions (' + subsRes.status + ')');

      let submissions;
      try {
        submissions = await subsRes.json();
      } catch (parseErr) {
        throw new Error('Could not parse submissions response: ' + parseErr.message);
      }

      console.log('[Admin] Data length:', submissions.length);
      console.log('[Admin] First item:', JSON.stringify(submissions[0]));

      let feedback = [];
      if (fbRes.ok) {
        try {
          feedback = await fbRes.json();
        } catch (parseErr) {
          console.warn('[teacher-admin] Failed to parse teacher_feedback response', parseErr);
        }
      } else {
        console.warn('[teacher-admin] Failed to load teacher_feedback', fbRes.status);
      }

      appState.submissions = submissions || [];
      appState.feedbackBySubmissionId = new Map();
      (feedback || []).forEach(row => {
        if (row.submission_id) appState.feedbackBySubmissionId.set(row.submission_id, row);
      });
      appState.loaded = true;

      // render() shows "No submissions yet" immediately when
      // appState.submissions is empty (see the length===0 check at the
      // top of render()) — no separate empty-array branch needed here.
      render();
      console.log('[Admin] Render complete');
    } catch (err) {
      console.log('[Admin] Error:', err);
      groupsContainer.hidden = true;
      emptyState.hidden = false;
      emptyStateMsg.textContent = 'Could not load submissions. Check your connection.';
    } finally {
      clearTimeout(watchdogTimer);
      loadingState.style.display = 'none';
    }
  }

  // ── Filters ───────────────────────────────────────────────────

  function setFilter(filter) {
    appState.filter = filter;
    document.querySelectorAll('.nav-link').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === filter);
    });
    document.querySelectorAll('.tab').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === filter);
    });
    render();
  }

  document.querySelectorAll('.nav-link, .tab').forEach(el => {
    el.addEventListener('click', () => setFilter(el.dataset.filter));
  });

  // ── Render ────────────────────────────────────────────────────

  function render() {
    const filtered = appState.submissions.filter(sub => {
      const isReviewed = appState.feedbackBySubmissionId.has(sub.id);
      if (appState.filter === 'pending') return !isReviewed;
      if (appState.filter === 'reviewed') return isReviewed;
      return true;
    });

    if (appState.submissions.length === 0) {
      emptyState.hidden = false;
      groupsContainer.hidden = true;
      emptyStateMsg.textContent = 'No submissions yet. Students will appear here after they submit their work.';
      return;
    }

    if (filtered.length === 0) {
      emptyState.hidden = false;
      groupsContainer.hidden = true;
      emptyStateMsg.textContent = appState.filter === 'pending'
        ? 'All caught up! No pending reviews.'
        : 'Nothing here yet.';
      return;
    }

    emptyState.hidden = true;
    groupsContainer.hidden = false;

    // Group by the student's identity. student_code (access-code
    // students — no Supabase Auth session, so no user_email/user_id at
    // all) takes priority since it's the real stable identifier for
    // those rows; otherwise fall back to user_email (Supabase-authed
    // students), then user_id, then the row itself as a last resort.
    const groups = new Map();
    filtered.forEach(sub => {
      const key = sub.student_code || sub.user_email || sub.user_id || ('row:' + sub.id);
      if (!groups.has(key)) {
        groups.set(key, {
          label: sub.user_name || sub.student_code || sub.user_email || 'Unknown student',
          identifier: sub.student_code || sub.user_email || null,
          submissions: []
        });
      }
      groups.get(key).submissions.push(sub);
    });

    const sortedGroups = Array.from(groups.values()).sort((a, b) => a.label.localeCompare(b.label));

    groupsContainer.innerHTML = '';
    sortedGroups.forEach(group => {
      const section = document.createElement('div');
      section.className = 'student-group';

      const header = document.createElement('div');
      header.className = 'student-group-header';
      header.textContent = group.label;
      if (group.identifier) {
        const tag = document.createElement('span');
        tag.className = 'code-tag';
        tag.textContent = group.identifier;
        header.appendChild(tag);
      }
      section.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'cards-grid';
      group.submissions.forEach(sub => grid.appendChild(buildCard(sub)));
      section.appendChild(grid);

      groupsContainer.appendChild(section);
    });
  }

  function buildCard(sub) {
    const feedbackRow = appState.feedbackBySubmissionId.get(sub.id);

    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.className = 'card-thumb';
    img.src = sub.image_url || '';
    img.alt = (sub.lesson_title || sub.lesson_id || 'Submission') + ' artwork';
    img.loading = 'lazy';
    card.appendChild(img);

    const body = document.createElement('div');
    body.className = 'card-body';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = sub.user_name || sub.student_code || sub.user_email || 'Unknown student';
    body.appendChild(title);

    // Access-code students (student_code set) never have a real email —
    // show their code prominently instead. Supabase-authed students
    // (student_code null) show email as before.
    if (sub.student_code) {
      const studentCode = document.createElement('div');
      studentCode.className = 'card-student-code';
      studentCode.textContent = sub.student_code;
      body.appendChild(studentCode);
    } else if (sub.user_email) {
      const studentSub = document.createElement('div');
      studentSub.className = 'card-student-email';
      studentSub.textContent = sub.user_email;
      body.appendChild(studentSub);
    }

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    meta.textContent = 'Lesson: ' + (sub.lesson_title || sub.lesson_id || '—') + ' · Submitted ' + formatDate(sub.created_at);
    body.appendChild(meta);

    if (feedbackRow) {
      const banner = document.createElement('div');
      banner.className = 'reviewed-banner';
      banner.textContent = '✅ Feedback sent on ' + formatDate(feedbackRow.created_at);
      body.appendChild(banner);

      if (feedbackRow.text_comment) {
        const comment = document.createElement('div');
        comment.className = 'reviewed-comment';
        comment.textContent = feedbackRow.text_comment;
        body.appendChild(comment);
      }
    } else {
      body.appendChild(buildFeedbackForm(sub));
    }

    card.appendChild(body);
    return card;
  }

  function buildFeedbackForm(sub) {
    const box = document.createElement('div');
    box.className = 'feedback-box';

    const label = document.createElement('div');
    label.className = 'feedback-box-label';
    label.textContent = 'Teacher Feedback';
    box.appendChild(label);

    const textarea = document.createElement('textarea');
    textarea.className = 'feedback-textarea';
    textarea.placeholder = 'Write a comment for this submission…';
    box.appendChild(textarea);

    const voiceRow = document.createElement('div');
    voiceRow.className = 'voice-row';

    const voiceLabel = document.createElement('span');
    voiceLabel.className = 'voice-label';
    voiceLabel.textContent = '🎤 Upload voice recording';
    voiceRow.appendChild(voiceLabel);

    const fileInputId = 'voice-' + sub.id;
    const fileBtn = document.createElement('label');
    fileBtn.className = 'voice-file-btn';
    fileBtn.setAttribute('for', fileInputId);
    fileBtn.textContent = 'Choose file';
    voiceRow.appendChild(fileBtn);

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'audio/*';
    fileInput.id = fileInputId;
    fileInput.style.display = 'none';
    voiceRow.appendChild(fileInput);

    const chosen = document.createElement('div');
    chosen.className = 'voice-file-chosen';
    const chosenName = document.createElement('span');
    chosen.appendChild(chosenName);
    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'voice-file-remove';
    removeBtn.textContent = 'Remove';
    chosen.appendChild(removeBtn);
    voiceRow.appendChild(chosen);

    fileInput.addEventListener('change', () => {
      const f = fileInput.files && fileInput.files[0];
      if (f) {
        chosenName.textContent = f.name;
        chosen.classList.add('visible');
      } else {
        chosen.classList.remove('visible');
      }
    });
    removeBtn.addEventListener('click', () => {
      fileInput.value = '';
      chosen.classList.remove('visible');
    });

    box.appendChild(voiceRow);

    const errorEl = document.createElement('div');
    errorEl.className = 'send-error';
    box.appendChild(errorEl);

    const sendBtn = document.createElement('button');
    sendBtn.type = 'button';
    sendBtn.className = 'send-btn';
    sendBtn.textContent = 'Send Feedback →';
    box.appendChild(sendBtn);

    sendBtn.addEventListener('click', async () => {
      const textComment = textarea.value.trim();
      const voiceFile = fileInput.files && fileInput.files[0];

      if (!textComment && !voiceFile) {
        errorEl.textContent = 'Add a comment or a voice recording before sending.';
        errorEl.classList.add('visible');
        return;
      }

      errorEl.classList.remove('visible');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';

      try {
        let voiceUrl = null;
        if (voiceFile) {
          voiceUrl = await uploadVoice(voiceFile, sub);
        }

        const feedbackData = {
          student_code: sub.user_email || sub.user_name || null,
          lesson_id: sub.lesson_id || null,
          submission_id: sub.id,
          text_comment: textComment || null,
          voice_url: voiceUrl,
          is_read: false
        };

        const res = await fetch(`${SUPABASE_URL}/rest/v1/${FEEDBACK_TABLE}`, {
          method: 'POST',
          headers: sbHeaders({
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          }),
          body: JSON.stringify(feedbackData)
        });

        if (!res.ok) {
          const errText = await res.text().catch(() => '');
          throw new Error('Save failed (' + res.status + ') ' + errText);
        }

        const inserted = await res.json().catch(() => null);
        const row = Array.isArray(inserted) ? inserted[0] : (inserted || feedbackData);
        if (!row.created_at) row.created_at = new Date().toISOString();
        appState.feedbackBySubmissionId.set(sub.id, row);

        render();
      } catch (err) {
        console.error('[teacher-admin] send feedback failed', err);
        errorEl.textContent = 'Could not send feedback. Please try again.';
        errorEl.classList.add('visible');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Feedback →';
      }
    });

    return box;
  }

  async function uploadVoice(file, sub) {
    const ext = (file.name && file.name.includes('.'))
      ? file.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g, '') || 'webm'
      : 'webm';
    const fileName = `${sub.id}/${Date.now()}_feedback.${ext}`;

    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${VOICE_BUCKET}/${fileName}`, {
      method: 'POST',
      headers: sbHeaders({ 'Content-Type': file.type || 'application/octet-stream' }),
      body: file
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      throw new Error('Voice upload failed (' + res.status + ') ' + errText);
    }

    return `${SUPABASE_URL}/storage/v1/object/public/${VOICE_BUCKET}/${fileName}`;
  }
})();
</script>
</body>
