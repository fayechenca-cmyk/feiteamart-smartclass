<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn From Masters: Basquiat · LFC017 · FEI Smart Class</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════════════
   LFC017 · Learn From Masters: Basquiat
   Creation track · Learn From Collection family
   
   PEDAGOGY:
   6 steps. Image-led. Low-text. No right-answer framing.
   Step 4 (Decode the Symbols) is the signature interactive moment —
   a Basquiat-inspired hero image is itself the teaching interface.
   
   AESTHETIC:
   Raw, urban, layered. Cream paper with paint blocks in
   black / red / yellow / blue. Patrick Hand + Permanent Marker
   typography. Visible texture and hand-pressure.
   
   COPYRIGHT NOTE:
   The hero image is an original Basquiat-inspired classroom 
   composition (inline SVG below). NOT a redraw of any known 
   Basquiat painting. External MoMA link provided for students 
   who want to see real Basquiat works.
   ════════════════════════════════════════════════════════════════ */

:root {
  /* Smart Class platform shell colors (kept for topbar consistency) */
  --ink: #1a1d2b;
  --ink-soft: rgba(26, 29, 43, 0.65);
  --ink-faint: rgba(26, 29, 43, 0.45);
  --ink-veryfaint: rgba(26, 29, 43, 0.15);
  --paper: #fafaf8;
  --paper-soft: #f5f5f7;
  --purple: #a78bfa;
  --cyan: #67e8f9;
  --gold: #c8a96e;
  --green: #1d9e75;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 18px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  
  /* Basquiat-coded lesson palette */
  --bsq-cream: #f5ecd2;       /* dirty off-white base */
  --bsq-cream-soft: #faf3e3;
  --bsq-paper: #f1e6c8;       /* rougher paper tone */
  --bsq-black: #1a1a1a;
  --bsq-charcoal: #2d2d2d;
  --bsq-red: #d63838;
  --bsq-red-deep: #a52828;
  --bsq-yellow: #f4c430;
  --bsq-yellow-warm: #e8a838;
  --bsq-blue: #2a5a8a;
  --bsq-blue-deep: #1a3d65;
  --bsq-green: #5a8a4a;
  --bsq-rust: #b8593a;
  --bsq-pink: #d49a8a;
  
  /* Artchi voices (same 4 voices as the platform standard) */
  --voice-look: #67e8f9;
  --voice-think: #a78bfa;
  --voice-make: #f9a8d4;
  --voice-reflect: #c8a96e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Open Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ═══ TOPBAR (Smart Class shell — identical to platform) ═══ */
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--ink-veryfaint);
  position: sticky; top: 0; z-index: 100;
}
.brand-link {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: 14px; color: var(--ink);
  text-decoration: none; letter-spacing: 0.3px;
}
.brand-mark { color: var(--purple); margin-right: 4px; }
.breadcrumb-trail {
  font-size: 11px; color: var(--ink-faint);
  font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
  margin-left: 6px;
}
.topbar-right {
  display: flex; align-items: center; gap: 14px;
  font-family: 'Montserrat', sans-serif; font-size: 12px;
}
.topbar-right a { color: var(--ink-soft); text-decoration: none; }
.user-pill { font-size: 12px; color: var(--ink-soft); }
.sign-out-btn {
  background: none; border: 1px solid var(--ink-veryfaint);
  border-radius: 16px; padding: 6px 12px; font-size: 11px;
  font-family: 'Montserrat', sans-serif; font-weight: 700;
  color: var(--ink-soft); cursor: pointer; letter-spacing: 0.3px;
}
.sign-out-btn:hover { background: var(--paper-soft); color: var(--ink); }

/* ═══ SIGN-IN SCREEN (platform-standard) ═══ */
.signin-screen {
  min-height: calc(100vh - 60px);
  display: flex; align-items: center; justify-content: center;
  padding: 30px 20px;
  background: linear-gradient(135deg, #fef3c7 0%, #fce7f3 50%, #f5ecd2 100%);
}
.signin-card {
  background: #fff; border-radius: var(--radius-lg);
  padding: 36px 28px; max-width: 380px; width: 100%;
  box-shadow: var(--shadow-lg); text-align: center;
}
.signin-kicker {
  font-family: 'Montserrat', sans-serif; font-size: 10px;
  font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  color: var(--bsq-red); margin-bottom: 12px;
}
.signin-title {
  font-family: 'Montserrat', sans-serif; font-size: 26px;
  font-weight: 900; margin-bottom: 8px;
}
.signin-subtitle {
  font-size: 14px; color: var(--ink-soft); margin-bottom: 24px;
}
.signin-label {
  display: block; text-align: left;
  font-family: 'Montserrat', sans-serif; font-size: 10px;
  font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--ink-soft); margin-bottom: 6px;
}
.signin-input {
  width: 100%; padding: 12px 14px; font-size: 15px;
  border: 1.5px solid var(--ink-veryfaint); border-radius: var(--radius-sm);
  font-family: 'Montserrat', sans-serif; font-weight: 700;
  letter-spacing: 0.5px; outline: none;
  transition: border 0.2s;
}
.signin-input:focus { border-color: var(--bsq-red); }
.signin-input.error { border-color: #e74c3c; animation: shake 0.4s; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.signin-btn {
  width: 100%; margin-top: 14px; padding: 14px;
  background: var(--bsq-black); color: #fff; border: none;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: 'Montserrat', sans-serif; font-weight: 800;
  font-size: 13px; letter-spacing: 1px;
}
.signin-btn:hover:not(:disabled) { background: #2a2a2a; }
.signin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.signin-error {
  display: none; margin-top: 12px; font-size: 12px; color: #e74c3c;
}
.signin-error.visible { display: block; }
.signin-help {
  margin-top: 22px; font-size: 12px; color: var(--ink-faint);
  line-height: 1.7;
}
.signin-help a { color: var(--bsq-red); text-decoration: none; font-weight: 700; }

/* ═══ LESSON CONTAINER ═══ */
.lesson {
  max-width: 780px; margin: 0 auto; padding: 24px 18px 80px;
}

/* ═══ BACK LINK ═══ */
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  font-family: 'Montserrat', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--ink-soft); padding: 6px 0; margin-bottom: 16px;
  text-decoration: none;
}
.back-link:hover { color: var(--bsq-red); }

/* ═══ STEP HEADER ═══ */
.step-header {
  margin-bottom: 24px;
}
.step-kicker {
  font-family: 'Permanent Marker', cursive;
  font-size: 12px; letter-spacing: 1.5px;
  color: var(--bsq-red); margin-bottom: 6px;
  text-transform: uppercase;
}
.step-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 30px; font-weight: 900;
  line-height: 1.1; margin-bottom: 8px;
  color: var(--bsq-black);
}
.step-prompt {
  font-family: 'Patrick Hand', cursive;
  font-size: 19px;
  color: var(--ink-soft);
  line-height: 1.4;
}

/* ═══ PROGRESS DOTS (6 steps) ═══ */
.progress-strip {
  display: flex; justify-content: center; gap: 10px;
  margin: 0 0 28px;
}
.progress-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--ink-veryfaint);
  cursor: pointer; transition: all 0.2s;
}
.progress-dot.done { background: var(--bsq-green); }
.progress-dot.current {
  width: 32px; border-radius: 5px;
  background: var(--bsq-red);
}
.progress-dot:hover { transform: scale(1.3); }

/* ═══ HERO IMAGE FRAME ═══ */
.hero-frame {
  background: var(--bsq-cream);
  border: 2px solid var(--bsq-black);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 18px;
  box-shadow: 4px 5px 0 var(--bsq-black);
  position: relative;
}
.hero-frame svg {
  display: block;
  width: 100%;
  height: auto;
}
.hero-caption {
  background: var(--bsq-cream-soft);
  padding: 10px 14px;
  border-top: 2px solid var(--bsq-black);
  font-family: 'Patrick Hand', cursive;
  font-size: 13px;
  color: var(--bsq-charcoal);
  font-style: italic;
}
.hero-link-bar {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 22px; flex-wrap: wrap;
}
.museum-link-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bsq-black); color: var(--bsq-cream);
  padding: 8px 14px;
  border-radius: 22px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.8px;
  text-decoration: none;
  text-transform: uppercase;
}
.museum-link-btn:hover { background: var(--bsq-red); }
.museum-link-note {
  font-family: 'Patrick Hand', cursive;
  font-size: 13px; color: var(--ink-faint);
  font-style: italic;
}

/* ═══ CHIP CHOICE GRID ═══ */
.chips-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 22px;
}
.chip {
  background: #fff;
  border: 1.5px solid var(--bsq-black);
  padding: 10px 16px;
  border-radius: 24px;
  font-family: 'Patrick Hand', cursive;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--bsq-black);
}
.chip:hover {
  background: var(--bsq-yellow);
}
.chip.selected {
  background: var(--bsq-black);
  color: var(--bsq-cream);
}
.chip.selected:hover {
  background: var(--bsq-charcoal);
}

/* ═══ ATTRACTION CARDS (Step 2) ═══ */
.attraction-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 22px;
}
@media (max-width: 480px) { .attraction-grid { grid-template-columns: 1fr; } }
.attraction-card {
  background: #fff;
  border: 1.5px solid var(--bsq-black);
  padding: 14px 16px;
  cursor: pointer;
  position: relative;
  font-family: 'Patrick Hand', cursive;
  font-size: 17px;
  color: var(--bsq-black);
  box-shadow: 2px 3px 0 var(--bsq-black);
  transition: all 0.15s;
}
.attraction-card:hover {
  transform: translate(-1px, -1px);
  box-shadow: 3px 4px 0 var(--bsq-black);
  background: var(--bsq-yellow);
}
.attraction-card.selected {
  background: var(--bsq-red);
  color: var(--bsq-cream);
  border-color: var(--bsq-red-deep);
}

/* ═══ FOLLOW-UP (Step 2 after choice) ═══ */
.follow-up {
  background: var(--bsq-cream);
  border: 2px solid var(--bsq-black);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-bottom: 22px;
  display: none;
}
.follow-up.visible { display: block; }
.follow-up-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 11px; letter-spacing: 1.2px;
  color: var(--bsq-red); margin-bottom: 8px;
  text-transform: uppercase;
}
.follow-up-text {
  font-family: 'Patrick Hand', cursive;
  font-size: 17px; color: var(--bsq-black);
  line-height: 1.4;
}

/* ═══ MEET BASQUIAT (Step 3) ═══ */
.portrait-block {
  display: flex; gap: 18px; align-items: center;
  margin-bottom: 28px;
  background: var(--bsq-cream-soft);
  border: 2px solid var(--bsq-black);
  border-radius: var(--radius-md);
  padding: 18px;
  box-shadow: 4px 5px 0 var(--bsq-black);
}
@media (max-width: 540px) { 
  .portrait-block { flex-direction: column; align-items: flex-start; }
}
.portrait-svg {
  flex-shrink: 0;
  width: 110px; height: 130px;
  background: var(--bsq-cream);
  border: 1.5px solid var(--bsq-black);
  border-radius: 4px;
}
.portrait-text { flex: 1; }
.portrait-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 22px; color: var(--bsq-black);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.portrait-body {
  font-size: 14px; line-height: 1.55;
  color: var(--bsq-charcoal);
}
.portrait-caveat {
  font-family: 'Patrick Hand', cursive;
  font-size: 12px; color: var(--ink-faint);
  margin-top: 8px;
  font-style: italic;
}

.three-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-bottom: 28px;
}
@media (max-width: 600px) { .three-cards { grid-template-columns: 1fr; } }
.fact-card {
  background: #fff;
  border: 1.5px solid var(--bsq-black);
  padding: 14px;
  position: relative;
  box-shadow: 2px 3px 0 var(--bsq-black);
}
.fact-card-num {
  font-family: 'Permanent Marker', cursive;
  font-size: 28px; color: var(--bsq-red);
  line-height: 1; margin-bottom: 8px;
}
.fact-card-text {
  font-family: 'Patrick Hand', cursive;
  font-size: 16px; line-height: 1.35;
  color: var(--bsq-black);
}

.expandable-panel {
  background: var(--bsq-cream-soft);
  border: 1.5px solid var(--bsq-black);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  overflow: hidden;
}
.expandable-trigger {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px; font-weight: 800;
  letter-spacing: 0.4px;
  color: var(--bsq-black);
  text-align: left;
}
.expandable-trigger:hover { background: var(--bsq-cream); }
.expandable-arrow { transition: transform 0.2s; font-size: 16px; }
.expandable-panel.open .expandable-arrow { transform: rotate(180deg); }
.expandable-content {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  padding: 0 16px;
}
.expandable-panel.open .expandable-content {
  max-height: 400px;
  padding: 0 16px 16px;
}
.expandable-content p {
  font-family: 'Patrick Hand', cursive;
  font-size: 16px; line-height: 1.5;
  color: var(--bsq-charcoal);
}

/* ═══ STEP 4 — DECODE THE SYMBOLS ═══ */
.decode-stage {
  position: relative;
  margin-bottom: 22px;
}
.decode-stage svg.decode-svg {
  display: block;
  width: 100%;
  height: auto;
  cursor: pointer;
}
.decode-prompt {
  position: absolute;
  bottom: 14px; left: 50%; transform: translateX(-50%);
  background: var(--bsq-black);
  color: var(--bsq-cream);
  font-family: 'Permanent Marker', cursive;
  font-size: 14px; letter-spacing: 1.2px;
  padding: 8px 18px; border-radius: 22px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  text-transform: uppercase;
}
.decode-stage.show-prompt .decode-prompt { opacity: 1; }

/* Hotspot region — invisible overlay on top of SVG */
.hotspot-region {
  fill: rgba(244, 196, 48, 0);
  stroke: rgba(244, 196, 48, 0);
  stroke-width: 3;
  cursor: pointer;
  transition: all 0.3s;
}
.hotspot-region.sweeping {
  fill: rgba(244, 196, 48, 0.25);
  stroke: rgba(244, 196, 48, 0.7);
  filter: drop-shadow(0 0 8px rgba(244, 196, 48, 0.7));
}
.hotspot-region:hover {
  fill: rgba(244, 196, 48, 0.18);
  stroke: rgba(244, 196, 48, 0.6);
  filter: drop-shadow(0 0 6px rgba(244, 196, 48, 0.5));
}
.hotspot-region.saved {
  stroke: var(--bsq-green);
  fill: rgba(90, 138, 74, 0.1);
}

/* Decode card (floating) */
.decode-card-overlay {
  position: fixed; inset: 0;
  background: rgba(20, 20, 20, 0.65);
  z-index: 200;
  display: none;
  align-items: center; justify-content: center;
  padding: 20px;
}
.decode-card-overlay.active { display: flex; }
.decode-card {
  background: var(--bsq-cream);
  border: 3px solid var(--bsq-black);
  max-width: 420px; width: 100%;
  padding: 24px;
  box-shadow: 6px 7px 0 var(--bsq-black);
  position: relative;
  animation: cardPop 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
}
@keyframes cardPop {
  from { transform: scale(0.85) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.decode-card-kicker {
  font-family: 'Permanent Marker', cursive;
  font-size: 11px; letter-spacing: 1.5px;
  color: var(--bsq-red); margin-bottom: 6px;
  text-transform: uppercase;
}
.decode-card-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 26px; color: var(--bsq-black);
  letter-spacing: 0.5px; margin-bottom: 12px;
  line-height: 1;
}
.decode-card-body {
  font-family: 'Patrick Hand', cursive;
  font-size: 17px; line-height: 1.5;
  color: var(--bsq-charcoal);
  margin-bottom: 18px;
}
.decode-card-saved-tag {
  display: inline-block;
  font-family: 'Patrick Hand', cursive;
  font-size: 14px;
  background: var(--bsq-yellow);
  border: 1.5px solid var(--bsq-black);
  padding: 4px 10px;
  border-radius: 4px;
  margin-bottom: 14px;
  color: var(--bsq-black);
}
.decode-card-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.decode-card-btn {
  flex: 1; min-width: 130px;
  padding: 10px 14px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.6px; text-transform: uppercase;
  cursor: pointer;
  border: 1.5px solid var(--bsq-black);
}
.decode-card-btn.save {
  background: var(--bsq-red);
  color: var(--bsq-cream);
}
.decode-card-btn.save:hover { background: var(--bsq-red-deep); }
.decode-card-btn.save.already-saved {
  background: var(--bsq-green);
  border-color: var(--bsq-green);
}
.decode-card-btn.close {
  background: #fff;
  color: var(--bsq-black);
}
.decode-card-btn.close:hover { background: var(--bsq-yellow); }

/* Saved tray (My visual language) */
.visual-tray {
  background: var(--bsq-cream-soft);
  border: 2px solid var(--bsq-black);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 22px;
  box-shadow: 2px 3px 0 var(--bsq-black);
}
.visual-tray-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 12px; letter-spacing: 1.2px;
  color: var(--bsq-red); margin-bottom: 10px;
  text-transform: uppercase;
}
.visual-tray-items {
  display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 28px;
}
.visual-tray-item {
  background: var(--bsq-yellow);
  border: 1.5px solid var(--bsq-black);
  padding: 4px 12px;
  border-radius: 14px;
  font-family: 'Patrick Hand', cursive;
  font-size: 14px;
  color: var(--bsq-black);
  animation: trayPop 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
}
@keyframes trayPop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
.visual-tray-empty {
  font-family: 'Patrick Hand', cursive;
  font-size: 14px; color: var(--ink-faint);
  font-style: italic;
}

/* ═══ STEP 5 — SYMBOL BUILDER (6 slots) ═══ */
.symbol-builder {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-bottom: 22px;
}
@media (max-width: 540px) { .symbol-builder { grid-template-columns: 1fr; } }
.symbol-slot {
  background: var(--bsq-cream);
  border: 2px dashed var(--bsq-black);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  min-height: 130px;
  display: flex; flex-direction: column;
}
.symbol-slot:hover {
  background: var(--bsq-cream-soft);
  border-style: solid;
}
.symbol-slot.filled {
  background: #fff;
  border: 2px solid var(--bsq-black);
  border-style: solid;
  box-shadow: 3px 4px 0 var(--bsq-black);
}
.symbol-slot-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 11px; letter-spacing: 1.2px;
  color: var(--bsq-red); margin-bottom: 8px;
  text-transform: uppercase;
}
.symbol-slot-prompt {
  font-family: 'Patrick Hand', cursive;
  font-size: 14px; color: var(--ink-soft);

/* ═══ BADGE CEREMONY ═══ */

  text-transform: uppercase;
}
.complete-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

<script>
// ════════════════════════════════════════════════════════════════
// LFC017 · Learn From Masters: Basquiat
// SECTION 1 — CONFIG
// ════════════════════════════════════════════════════════════════
const ROSTER_PATH = '../../core/student-access-codes.js';
const PROFILE_KEY = 'fei_user_profile';
const LESSON_PROGRESS_KEY = 'fei_lfc017_progress';
const JUDGMENT_CARDS_KEY = 'lfc_cards_v1';  // Cross-lesson card portfolio
const LESSON_ID = 'lfc017';

// ════════════════════════════════════════════════════════════════
// SECTION 2 — THE HERO IMAGE (inline SVG)
//
// Basquiat-INSPIRED original composition for classroom use.
// NOT a copy of any known Basquiat work.
// Each of 7 hotspot regions has data-hotspot-id matching HOTSPOTS keys.
// ════════════════════════════════════════════════════════════════
function renderHeroSVG(opts) {
  opts = opts || {};
  const showHotspots = !!opts.interactive;
  
  return `
<svg class="${opts.interactive ? 'decode-svg' : ''}" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Cream paper background with subtle texture -->
  <defs>
    <pattern id="paperTexture" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#f5ecd2"/>
      <circle cx="20" cy="30" r="0.5" fill="#a89060" opacity="0.4"/>
      <circle cx="80" cy="60" r="0.4" fill="#a89060" opacity="0.4"/>
      <circle cx="140" cy="20" r="0.5" fill="#a89060" opacity="0.4"/>
      <circle cx="170" cy="100" r="0.4" fill="#a89060" opacity="0.4"/>
      <circle cx="40" cy="150" r="0.5" fill="#a89060" opacity="0.4"/>
      <circle cx="100" cy="180" r="0.4" fill="#a89060" opacity="0.4"/>
      <circle cx="160" cy="170" r="0.5" fill="#a89060" opacity="0.4"/>
      <line x1="0" y1="50" x2="200" y2="51" stroke="#c0a878" stroke-width="0.3" opacity="0.3"/>
      <line x1="0" y1="130" x2="200" y2="128" stroke="#c0a878" stroke-width="0.3" opacity="0.3"/>
    </pattern>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" />
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#paperTexture)"/>
  
  <!-- Layered paint blocks (the underlayer) -->
  <rect x="40" y="80" width="220" height="180" fill="#f4c430" opacity="0.45" transform="rotate(-2 150 170)"/>
  <rect x="510" y="30" width="240" height="140" fill="#2a5a8a" opacity="0.4" transform="rotate(3 630 100)"/>
  <rect x="80" y="380" width="280" height="150" fill="#d63838" opacity="0.35" transform="rotate(-1 220 455)"/>
  <rect x="450" y="380" width="220" height="170" fill="#5a8a4a" opacity="0.3" transform="rotate(2 560 465)"/>
  
  <!-- Scratchy diagonal layering marks -->
  <g stroke="#1a1a1a" stroke-width="1.5" opacity="0.25" fill="none">
    <line x1="40" y1="100" x2="240" y2="60"/>
    <line x1="50" y1="120" x2="250" y2="80"/>
    <line x1="510" y1="180" x2="730" y2="40"/>
    <line x1="520" y1="200" x2="740" y2="60"/>
  </g>

  <!-- ═══════ HOTSPOT 7: Layered paint area (back layer) ═══════ -->
  ${showHotspots ? '<rect class="hotspot-region" data-hotspot-id="layers" x="430" y="370" width="260" height="200" />' : ''}
  
  <!-- ═══════ HOTSPOT 1: HEAD / FIGURE (central) ═══════ -->
  <!-- Crown above the head -->
  <g transform="translate(310, 80)">
    <path d="M 0 30 L 20 0 L 40 30 L 60 0 L 80 30 L 100 0 L 120 30 L 120 50 L 0 50 Z" 
          fill="#f4c430" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="20" cy="2" r="4" fill="#d63838" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="60" cy="2" r="4" fill="#d63838" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="100" cy="2" r="4" fill="#d63838" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  
  <!-- Mask-like face -->
  <g transform="translate(280, 140)">
    <!-- Face outline (rough hand-drawn ellipse) -->
    <path d="M 90 0 
             C 130 5, 180 30, 175 100
             C 175 150, 160 200, 90 210
             C 30 200, 0 150, 5 100
             C 5 30, 50 5, 90 0 Z"
          fill="#f5ecd2" stroke="#1a1a1a" stroke-width="4"/>
    
    <!-- Brain/scribbles inside the head top -->
    <g stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.7">
      <path d="M 40 30 Q 60 20, 80 32 Q 100 22, 120 32 Q 140 22, 150 35"/>
      <path d="M 35 50 Q 60 40, 90 52 Q 120 42, 150 52"/>
    </g>
    
    <!-- Left eye (target-style) -->
    <circle cx="50" cy="90" r="14" fill="#fff" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="50" cy="90" r="8" fill="#d63838" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="50" cy="90" r="3" fill="#1a1a1a"/>
    
    <!-- Right eye -->
    <circle cx="130" cy="90" r="14" fill="#fff" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="130" cy="90" r="8" fill="#2a5a8a" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="130" cy="90" r="3" fill="#1a1a1a"/>
    
    <!-- Nose (slash) -->
    <line x1="90" y1="105" x2="80" y2="135" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="80" y1="135" x2="95" y2="138" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Teeth-bared mouth -->
    <rect x="55" y="150" width="70" height="22" fill="#fff" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="65" y1="150" x2="65" y2="172" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="78" y1="150" x2="78" y2="172" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="91" y1="150" x2="91" y2="172" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="103" y1="150" x2="103" y2="172" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="116" y1="150" x2="116" y2="172" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Neck/body suggestion -->
    <path d="M 60 210 L 50 250 L 130 250 L 120 210 Z" fill="#f5ecd2" stroke="#1a1a1a" stroke-width="3"/>
    
    <!-- Arrow/halo above head -->
    <path d="M 75 -10 L 85 -20 L 105 -10" stroke="#d63838" stroke-width="3" fill="none"/>

  ${showHotspots ? '<rect class="hotspot-region" data-hotspot-id="head" x="270" y="70" width="200" height="320" />' : ''}
  
  <!-- ═══════ HOTSPOT 2: DOG / CREATURE (lower left) ═══════ -->
  <g transform="translate(70, 430)">

    <path d="M 0 50

    <!-- Head -->
    <path d="M 110 38 L 135 28 L 155 30 L 155 50 L 145 55 L 130 52" 
          fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Eye on creature -->
    <circle cx="143" cy="40" r="2.5" fill="#f4c430"/>
    <!-- Teeth -->
    <line x1="145" y1="50" x2="147" y2="55" stroke="#fff" stroke-width="1.5"/>
    <line x1="150" y1="50" x2="152" y2="55" stroke="#fff" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M 0 50 L -15 35 L -20 20" stroke="#1a1a1a" stroke-width="3" fill="none"/>
    <!-- Rib lines (anatomical) -->
    <line x1="35" y1="45" x2="45" y2="65" stroke="#d63838" stroke-width="1.5"/>
    <line x1="55" y1="40" x2="65" y2="65" stroke="#d63838" stroke-width="1.5"/>
    <line x1="75" y1="40" x2="85" y2="65" stroke="#d63838" stroke-width="1.5"/>
  </g>
  ${showHotspots ? '<rect class="hotspot-region" data-hotspot-id="creature" x="45" y="420" width="195" height="120" />' : ''}
  
  <!-- ═══════ HOTSPOT 3: CITY CODE (upper right, word block) ═══════ -->
  <g transform="translate(530, 90)" font-family="Permanent Marker, sans-serif" fill="#1a1a1a">
    <rect x="-10" y="-30" width="200" height="100" fill="#f5ecd2" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="0" y="0" font-size="32" font-weight="900">CITY</text>

async function loadRoster() {
  try {
    const response = await fetch(ROSTER_PATH, { cache: 'no-cache' });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const text = await response.text();
    const blockRegex = /\{[^{}]*\}/g;
    let block;
    while ((block = blockRegex.exec(text)) !== null) {
      const blockText = block[0];
      const idMatch = blockText.match(/id\s*:\s*["']([^"']+)["']/);
      const nameMatch = blockText.match(/displayName\s*:\s*["']([^"']+)["']/);
      const trialMatch = blockText.match(/isTrial\s*:\s*(true|false)/);
      if (!idMatch || !nameMatch) continue;
      validStudents.set(idMatch[1].toUpperCase(), {
        displayName: nameMatch[1],
        isTrial: trialMatch ? trialMatch[1] === 'true' : false
      });
    }
    console.log('[LFC017] Loaded ' + validStudents.size + ' codes');
  } catch (err) {
    console.warn('[LFC017] Roster load failed:', err);
  }
}

function loadProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    userProfile = raw ? JSON.parse(raw) : null;

}

function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); userProfile = p; }
  catch (e) {}
}

function clearProfile() {
  try { localStorage.removeItem(PROFILE_KEY); userProfile = null; }
  catch (e) {}
}

function loadLessonProgress() {
  if (!userProfile) return;
  try {
    const key = LESSON_PROGRESS_KEY + '_' + userProfile.studentCode;
    const raw = localStorage.getItem(key);
    if (raw) lessonProgress = { ...lessonProgress, ...JSON.parse(raw) };
  } catch (e) {}
}

function saveLessonProgress() {
  if (!userProfile) return;
  try {
    const key = LESSON_PROGRESS_KEY + '_' + userProfile.studentCode;
    localStorage.setItem(key, JSON.stringify(lessonProgress));
  } catch (e) {}
}

// Cross-lesson card portfolio (same key Basquiat shares with lfc054)
function saveJudgmentCard(card) {
  try {
    const raw = localStorage.getItem(JUDGMENT_CARDS_KEY);
    const cards = raw ? JSON.parse(raw) : [];
    const existingIdx = cards.findIndex(c =>
      c.lessonId === LESSON_ID && c.judgmentId === card.judgmentId
    );
    const record = {
      lessonId: LESSON_ID,
      judgmentId: card.judgmentId,
      level: card.level || 1,
      question: card.question,
      answer: card.answer,
      studentCode: userProfile?.studentCode,
      savedAt: Date.now()
    };
    if (existingIdx >= 0) cards[existingIdx] = record;
    else cards.push(record);
    localStorage.setItem(JUDGMENT_CARDS_KEY, JSON.stringify(cards));
  } catch (e) {}
}

function renderCurrentStep() {
  const step = findStep(lessonProgress.currentStep);
  if (!step) return;
  const container = document.getElementById('lesson-content');
  container.innerHTML = renderHeader(step) + renderProgressStrip(step) + renderStepBody(step) + renderNav(step);
  window.scrollTo(0, 0);
  
  // Post-render hooks
  if (step.id === 'step-4-decode-symbols') {
    setupHotspotInteraction();
  }
}

function renderHeader(step) {
  return `
    <div class="step-header">
      <div class="step-kicker">Step ${step.step} of ${STEPS.length} · Learn From Masters · Basquiat</div>
      <h1 class="step-title">${escapeHtml(step.title)}</h1>
      <p class="step-prompt">${escapeHtml(step.prompt)}</p>
    </div>
  `;
}

function renderProgressStrip(step) {
  const currentIdx = stepIndex(step.id);
  let html = '<div class="progress-strip">';
  STEPS.forEach((s, i) => {
    let cls = 'progress-dot';
    if (lessonProgress.completed.includes(s.id)) cls += ' done';
    if (i === currentIdx) cls += ' current';
    html += `<div class="${cls}" onclick="jumpToStep('${s.id}')" title="Step ${s.step}: ${escapeHtml(s.title)}"></div>`;
  });
  html += '</div>';
  return html;
}

function renderStepBody(step) {
  switch (step.id) {
    case 'step-1-first-look': return renderStep1(step);
    case 'step-2-pulls-you-in': return renderStep2(step);
    case 'step-3-meet-basquiat': return renderStep3(step);
    case 'step-4-decode-symbols': return renderStep4(step);
    case 'step-5-symbol-language': return renderStep5(step);
    case 'step-6-make-the-piece': return renderStep6(step);
    case 'badge-ceremony': return renderBadgeCeremony(step);
    default: return '<p>Unknown step</p>';
  }
}

// ─── Shared bits ─────────────────────────────────────────────
function renderArtchi(step) {
  if (!step.artchi) return '';
  const voice = step.artchi.voice;
  return `
    <div class="artchi-block voice-${voice}">
      <div class="artchi-avatar">♛</div>
      <div class="artchi-voice">${escapeHtml(ARTCHI_VOICES[voice].label)}</div>
      <div class="artchi-text">${escapeHtml(step.artchi.text)}</div>
    </div>
  `;
}

function renderNav(step) {
  if (step.id === 'badge-ceremony') return '';
  const idx = stepIndex(step.id);
  const isFirst = idx === 0;
  const isLast = idx === STEPS.length - 1;
  const canProceed = canAdvance(step);
  return `
    <div class="lesson-nav">
      <button class="nav-btn" onclick="goPrev()" ${isFirst ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn primary" onclick="goNext()" ${!canProceed ? 'disabled' : ''}>
        ${isLast ? 'Finish lesson' : 'Continue →'}
      </button>
    </div>
  `;
}

function canAdvance(step) {
  switch (step.completionRule) {
    case 'chips':
      if (step.id === 'step-1-first-look') return lessonProgress.step1Chips.length >= step.minSelections;
      if (step.id === 'step-3-meet-basquiat') return lessonProgress.step3Chips.length >= step.minSelections;
      return true;
    case 'attractions':
      return lessonProgress.step2Attractions.length >= step.minSelections;
    case 'hotspots':
      return lessonProgress.savedMoves.length >= step.minSavedMoves;
    case 'slots':
      return Object.values(lessonProgress.symbolSlots).filter(v => v && v.trim()).length >= step.minSelections;
    case 'upload':
      return !!lessonProgress.finalUpload;
    default: return true;
  }
}

// ════════════════════════════════════════════════════════════════
// SECTION 8 — STEP HANDLERS / EVENT WIRING
// ════════════════════════════════════════════════════════════════
function goNext() {
  const step = findStep(lessonProgress.currentStep);
  if (!canAdvance(step)) {
    let msg = 'Not yet';
    if (step.completionRule === 'chips' || step.completionRule === 'attractions') msg = 'Make a selection first';
    if (step.completionRule === 'hotspots') msg = `Save ${step.minSavedMoves} moves first`;
    if (step.completionRule === 'slots') msg = `Fill ${step.minSelections} slots first`;
    if (step.completionRule === 'upload') msg = 'Upload your piece to finish';
    toast(msg, 1800);
    return;
  }
  if (!lessonProgress.completed.includes(step.id)) {
    lessonProgress.completed.push(step.id);
  }
  
  // Save key answers as judgment cards (cross-lesson portfolio)
  saveStepAsCard(step);
  
  const idx = stepIndex(step.id);
  if (idx < STEPS.length - 1) {
    lessonProgress.currentStep = STEPS[idx + 1].id;
  } else {
    // Last step done → badge ceremony
    lessonProgress.currentStep = 'badge-ceremony';
  }
  saveLessonProgress();
  
  if (lessonProgress.currentStep === 'badge-ceremony') {
    const container = document.getElementById('lesson-content');
    container.innerHTML = renderBadgeCeremony();
    window.scrollTo(0, 0);
  } else {
    renderCurrentStep();
  }
}

function goPrev() {
  const idx = stepIndex(lessonProgress.currentStep);
  if (idx > 0) {
    lessonProgress.currentStep = STEPS[idx - 1].id;
    saveLessonProgress();
    renderCurrentStep();
  }
}

function jumpToStep(stepId) {
  const targetIdx = stepIndex(stepId);
  const currentIdx = stepIndex(lessonProgress.currentStep);
  if (lessonProgress.completed.includes(stepId) || targetIdx <= currentIdx) {
    lessonProgress.currentStep = stepId;
    saveLessonProgress();
    renderCurrentStep();
  }
}

function saveStepAsCard(step) {
  // For step 1, 2, 3 — save key answers to cross-lesson card portfolio
  if (step.id === 'step-1-first-look' && lessonProgress.step1Chips.length) {
    saveJudgmentCard({
      judgmentId: 'lfc017-first-look',
      level: 1,
      question: 'Basquiat · First Look · What I noticed first',
      answer: lessonProgress.step1Chips.join(', ')
    });
  }
  if (step.id === 'step-2-pulls-you-in' && lessonProgress.step2Attractions.length) {
    const labels = lessonProgress.step2Attractions
      .map(id => STEP2_CARDS.find(c => c.id === id)?.label || id);
    saveJudgmentCard({
      judgmentId: 'lfc017-attraction',
      level: 2,
      question: 'Basquiat · What pulled me in',
      answer: labels.join(' · ')
    });
  }
  if (step.id === 'step-4-decode-symbols' && lessonProgress.savedMoves.length) {
    saveJudgmentCard({
      judgmentId: 'lfc017-visual-moves',
      level: 2,
      question: 'Basquiat · Visual moves I saved',
      answer: lessonProgress.savedMoves.join(' · ')
    });
  }
}

// Step 1 — chip toggle
function toggleStep1Chip(chip) {
  const idx = lessonProgress.step1Chips.indexOf(chip);
  if (idx >= 0) lessonProgress.step1Chips.splice(idx, 1);
  else lessonProgress.step1Chips.push(chip);
  saveLessonProgress();

}

// Step 2 — attraction toggle
function toggleStep2Card(id) {
  const idx = lessonProgress.step2Attractions.indexOf(id);
  if (idx >= 0) {
    lessonProgress.step2Attractions.splice(idx, 1);
  } else {
    if (lessonProgress.step2Attractions.length >= 2) {
      // Cap at 2 — replace oldest
      lessonProgress.step2Attractions.shift();
    }
    lessonProgress.step2Attractions.push(id);
  }
  saveLessonProgress();
  renderCurrentStep();
}

// Step 3 — chip toggle + panel expand
function toggleStep3Chip(chip) {
  const idx = lessonProgress.step3Chips.indexOf(chip);
  if (idx >= 0) lessonProgress.step3Chips.splice(idx, 1);
  else lessonProgress.step3Chips.push(chip);
  saveLessonProgress();

function togglePanel(title, idx) {
  const pIdx = lessonProgress.step3OpenPanels.indexOf(title);
  if (pIdx >= 0) lessonProgress.step3OpenPanels.splice(pIdx, 1);

// ─── Step 4 — Hotspot interaction logic ──────────────────────
function setupHotspotInteraction() {
  // Attach click handlers to all hotspot regions
  const regions = document.querySelectorAll('.hotspot-region');
  regions.forEach(r => {
    const id = r.getAttribute('data-hotspot-id');
    r.addEventListener('click', (e) => {
      e.stopPropagation();
      openDecodeCard(id);
    });
    // Mark previously-saved hotspots
    const hs = HOTSPOTS[id];
    if (hs && lessonProgress.savedMoves.includes(hs.savedMove)) {
      r.classList.add('saved');
    }
  });
  
  // Phase A → B → C transition
  if (!lessonProgress.hotspotSweepDone) {
    // On any click anywhere in the stage (or after first interaction), start sweep
    const stage = document.getElementById('decode-stage');
    if (stage) {
      const startSweep = () => {
        if (lessonProgress.hotspotSweepDone) return;
        stage.classList.remove('show-prompt');
        runSweep();
        stage.removeEventListener('click', startSweep);
      };
      stage.addEventListener('click', startSweep);
      // Auto-start sweep after 2 seconds if user hasn't clicked
      setTimeout(() => {
        if (!lessonProgress.hotspotSweepDone) startSweep();
      }, 2000);
    }
  }
}

function runSweep() {
  let i = 0;
  const interval = 400;
  function step() {
    if (i >= HOTSPOT_SWEEP_ORDER.length) {
      lessonProgress.hotspotSweepDone = true;
      saveLessonProgress();
      // Clear all sweep classes
      document.querySelectorAll('.hotspot-region').forEach(r => r.classList.remove('sweeping'));
      const prompt = document.querySelector('.decode-prompt');
      if (prompt) {
        prompt.textContent = 'Tap any glowing region';
        document.getElementById('decode-stage').classList.add('show-prompt');
        setTimeout(() => document.getElementById('decode-stage').classList.remove('show-prompt'), 2500);
      }
      return;
    }
    const id = HOTSPOT_SWEEP_ORDER[i];
    document.querySelectorAll('.hotspot-region').forEach(r => r.classList.remove('sweeping'));
    const region = document.querySelector(`[data-hotspot-id="${id}"]`);
    if (region) region.classList.add('sweeping');
    i++;
    setTimeout(step, interval);
  }
  step();
}

function openDecodeCard(hotspotId) {
  const hs = HOTSPOTS[hotspotId];
  if (!hs) return;
  if (!lessonProgress.hotspotsVisited.includes(hotspotId)) {
    lessonProgress.hotspotsVisited.push(hotspotId);
    saveLessonProgress();
  }
  
  const alreadySaved = lessonProgress.savedMoves.includes(hs.savedMove);
  const content = document.getElementById('decode-card-content');
  content.innerHTML = `
    <div class="decode-card-kicker">${alreadySaved ? '✓ Saved · Visual move' : 'Visual move'}</div>
    <div class="decode-card-title">${escapeHtml(hs.cardTitle)}</div>
    <div class="decode-card-body">${escapeHtml(hs.cardBody)}</div>
    <div class="decode-card-saved-tag">saves as: <strong>${escapeHtml(hs.savedMove)}</strong></div>
    <div class="decode-card-actions">
      <button class="decode-card-btn save ${alreadySaved ? 'already-saved' : ''}"
        onclick="${alreadySaved ? 'unsaveMove' : 'saveMove'}('${hotspotId}')">
        ${alreadySaved ? 'Saved ✓ tap to remove' : 'Save this visual move'}
      </button>
      <button class="decode-card-btn close" onclick="closeDecodeCard()">Keep exploring</button>
    </div>
  `;
  document.getElementById('decode-card-overlay').classList.add('active');
}

function closeDecodeCard() {
  document.getElementById('decode-card-overlay').classList.remove('active');
}

function saveMove(hotspotId) {
  const hs = HOTSPOTS[hotspotId];
  if (!hs) return;
  if (!lessonProgress.savedMoves.includes(hs.savedMove)) {
    lessonProgress.savedMoves.push(hs.savedMove);
    saveLessonProgress();
    // Mark region as saved
    const region = document.querySelector(`[data-hotspot-id="${hotspotId}"]`);
    if (region) region.classList.add('saved');
    // Update tray
    const tray = document.getElementById('visual-tray-items');
    if (tray) tray.innerHTML = renderTrayItems();
    toast('Saved: ' + hs.savedMove, 1500);
  }
  closeDecodeCard();
  // Re-render to update the count + nav state
  renderCurrentStep();
}

function unsaveMove(hotspotId) {
  const hs = HOTSPOTS[hotspotId];
  if (!hs) return;
  const idx = lessonProgress.savedMoves.indexOf(hs.savedMove);
  if (idx >= 0) {
    lessonProgress.savedMoves.splice(idx, 1);
    saveLessonProgress();
  }
  closeDecodeCard();
  renderCurrentStep();
}

// ─── Step 5 — Slot input modal ───────────────────────────────
let currentSlotId = null;

function openSlotModal(slotId) {
  currentSlotId = slotId;
  const slot = STEP5_SLOTS.find(s => s.id === slotId);
  const existing = lessonProgress.symbolSlots[slotId] || '';
  const content = document.getElementById('slot-modal-content');
  content.innerHTML = `
    <div class="slot-modal-title">${escapeHtml(slot.label)}</div>
    <div class="slot-modal-prompt">${escapeHtml(slot.prompt)}</div>
    <textarea class="slot-modal-textarea" id="slot-input" placeholder="write or describe your symbol here">${escapeHtml(existing)}</textarea>
    <div class="slot-modal-suggestions">
      ${slot.suggestions.map(s => `<button class="slot-suggestion" onclick="useSuggestion('${escapeAttr(s)}')">${escapeHtml(s)}</button>`).join('')}
    </div>
    <div class="slot-modal-actions">
      <button class="nav-btn primary" onclick="saveSlot()">Save</button>
      <button class="nav-btn" onclick="closeSlotModal()">Cancel</button>
      ${existing ? '<button class="nav-btn" onclick="clearSlot()" style="margin-left:auto;color:var(--bsq-red);">Clear</button>' : ''}
    </div>
  `;
  document.getElementById('slot-modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('slot-input').focus(), 100);
}

function useSuggestion(text) {
  document.getElementById('slot-input').value = text;
}

function saveSlot() {
  if (!currentSlotId) return;
  const text = document.getElementById('slot-input').value.trim();
  if (text) {
    lessonProgress.symbolSlots[currentSlotId] = text;
  } else {
    delete lessonProgress.symbolSlots[currentSlotId];
  }
  saveLessonProgress();
  closeSlotModal();
  renderCurrentStep();
}

function clearSlot() {
  if (!currentSlotId) return;
  delete lessonProgress.symbolSlots[currentSlotId];
  saveLessonProgress();
  closeSlotModal();
  renderCurrentStep();
}

function closeSlotModal() {
  document.getElementById('slot-modal-overlay').classList.remove('active');
  currentSlotId = null;
}

// ─── Step 6 ──────────────────────────────────────────────────
function selectStartMode(mode) {
  lessonProgress.startMode = lessonProgress.startMode === mode ? null : mode;
  saveLessonProgress();
  renderCurrentStep();
}

function handleFinalUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    toast('Image too large (10MB max)', 2000);
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    lessonProgress.finalUpload = e.target.result;
    saveLessonProgress();
    renderCurrentStep();
    toast('Uploaded ✓', 1500);
  };
  reader.readAsDataURL(file);
}

function replaceUpload() {
  lessonProgress.finalUpload = null;
  saveLessonProgress();
  renderCurrentStep();
}

function saveReflection(text) {
  lessonProgress.reflection = text;
  saveLessonProgress();
}

function completeLessonAndReturnToStudio() {
  if (userProfile) {
    const completed = userProfile.completedLessons || [];
    if (!completed.includes('lfc017')) {
      completed.push('lfc017');
      userProfile.completedLessons = completed;
      saveProfile(userProfile);
    }
  }
  // Final card capture
  if (lessonProgress.reflection && lessonProgress.reflection.trim()) {
    saveJudgmentCard({
      judgmentId: 'lfc017-final-reflection',
      level: 3,
      question: 'Basquiat · Final reflection',
      answer: lessonProgress.reflection.trim()
    });
  }
  window.location.href = '../../creation/';
}

// ════════════════════════════════════════════════════════════════
// SECTION 9 — SIGN-IN
// ════════════════════════════════════════════════════════════════
function updateSignInBtn() {
  const input = document.getElementById('signin-code');
  document.getElementById('signin-btn').disabled = input.value.trim().length < 3;
}

function attemptSignIn() {
  const input = document.getElementById('signin-code');
  const error = document.getElementById('signin-error');
  const code = input.value.trim().toUpperCase();
  if (!code) return;
  const match = validStudents.get(code);
  if (!match) {
    input.classList.add('error');
    error.classList.add('visible');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }
  const profile = {
    id: code,
    studentCode: code,
    name: match.displayName,
    tier: match.isTrial ? 'trial' : 'member',
    completedLessons: [],
    createdAt: Date.now(),
    lastSeenAt: Date.now()
  };
  const existing = userProfile;
  if (existing && existing.studentCode === code) {
    profile.completedLessons = existing.completedLessons || [];
    profile.createdAt = existing.createdAt;
  }
  saveProfile(profile);
  loadLessonProgress();
  showLesson();
}

function signOut() {
  if (confirm('Sign out? Progress saved on this device.')) {
    clearProfile();
    window.location.reload();
  }
}

// ════════════════════════════════════════════════════════════════
// SECTION 10 — UTILITIES
// ════════════════════════════════════════════════════════════════
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function escapeAttr(s) {
  if (s == null) return '';
  return String(s).replace(/['"\\]/g, c => '\\' + c);
}

let _toastTimer = null;
function toast(msg, durationMs) {
  const el = document.getElementById('complete-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), durationMs || 2000);
}

// Window-level exposure (for inline onclick)
window.goNext = goNext;
window.goPrev = goPrev;
window.jumpToStep = jumpToStep;
window.toggleStep1Chip = toggleStep1Chip;
window.toggleStep2Card = toggleStep2Card;
window.toggleStep3Chip = toggleStep3Chip;
window.togglePanel = togglePanel;
window.openDecodeCard = openDecodeCard;
window.closeDecodeCard = closeDecodeCard;
window.saveMove = saveMove;
window.unsaveMove = unsaveMove;
window.openSlotModal = openSlotModal;
window.closeSlotModal = closeSlotModal;
window.useSuggestion = useSuggestion;
window.saveSlot = saveSlot;
window.clearSlot = clearSlot;
window.selectStartMode = selectStartMode;
window.handleFinalUpload = handleFinalUpload;
window.replaceUpload = replaceUpload;
window.saveReflection = saveReflection;
window.completeLessonAndReturnToStudio = completeLessonAndReturnToStudio;
window.signOut = signOut;
window.attemptSignIn = attemptSignIn;

// ════════════════════════════════════════════════════════════════
// SECTION 11 — INIT
// ════════════════════════════════════════════════════════════════
document.getElementById('signin-code').addEventListener('input', (e) => {
  e.target.value = e.target.value.toUpperCase();
  updateSignInBtn();
  document.getElementById('signin-error').classList.remove('visible');
});
document.getElementById('signin-code').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') attemptSignIn();
});
document.getElementById('signin-btn').addEventListener('click', attemptSignIn);
document.getElementById('try-code-link').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('signin-code').value = 'TRYNEW';
  updateSignInBtn();
});

(async function init() {
  await loadRoster();
  loadProfile();
  if (userProfile) {
    loadLessonProgress();
    showLesson();
  } else {
    showSignIn();
  }
})();
</script>
