<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Step 3 · Imagine Your Dream Studio · Dream Art Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/studio-style.css">

<!-- Art GPS access control (loaded before this page's script so FEIAccess is available) -->
<script src="../../../core/auth.js"></script>
<script src="../../../core/access.js"></script>
<!-- Shared step/state module -->
<script src="../shared/studio-state.js"></script>

<style>
  .objects-counter {
    text-align: center; font-size: 13px; font-weight: 800; color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .objects-guidance {
    text-align: center; font-size: 11.5px; color: var(--ink-muted); margin-bottom: 16px;
  }
  .objects-guidance.met { color: var(--green); font-weight: 700; }

  /* ── Interactive image map ──────────────────────────────────
     Percentages are ROUGH ESTIMATES (per Faye) — each hotspot is a
     single object below in HOTSPOTS, so tuning positions later is
     just editing those left/top/width/height numbers. */
  .image-map-wrap {
    position: relative;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(26,29,43,0.15);
    margin-bottom: 14px;
    line-height: 0; /* remove the inline-image baseline gap */
    background: #fff;
  }
  .studio-image { display: block; width: 100%; height: auto; }

  .hotspot-layer { position: absolute; inset: 0; }
  .hotspot {
    position: absolute;
    cursor: pointer;
    border-radius: 10px;
    border: 2px solid transparent;
    -webkit-tap-highlight-color: transparent;
    transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease, background-color .2s ease;
  }
  .hotspot:hover {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.1);
  }
  .hotspot.selected {
    border-color: var(--gold);
    background: rgba(200,169,110,0.14);
    box-shadow: 0 0 15px var(--gold);
    transform: scale(1.02);
    animation: hotspotPulse 1.4s ease-in-out infinite;
  }
  @keyframes hotspotPulse {
    0%, 100% { box-shadow: 0 0 15px var(--gold); }
    50% { box-shadow: 0 0 24px var(--gold); }
  }

  .image-map-caption {
    text-align: center; font-size: 11.5px; color: var(--ink-muted); margin-bottom: 18px;
  }

  .selected-list {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-bottom: 22px; min-height: 20px;
  }
  .selected-list-empty { font-size: 12px; color: var(--ink-muted); }
  .selected-chip {
    background: rgba(200,169,110,0.14); border: 1.5px solid var(--gold);
    color: var(--ink); font-size: 12px; font-weight: 700;
    border-radius: 16px; padding: 6px 12px;
  }

  /* ── Video panel (placeholder — no real video yet) ──────────── */
  .video-panel {
    position: relative;
    height: 200px;
    background: #f6efdc;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(26,29,43,0.12);
    margin: 0 0 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 16px;
    animation: videoPanelIn .22s ease;
  }
  @keyframes videoPanelIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .video-panel-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; font-size: 13px; font-weight: 800;
    color: var(--ink-muted); cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .video-panel-play { font-size: 38px; margin-bottom: 8px; line-height: 1; }
  .video-panel-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; color: var(--ink); margin-bottom: 4px; }
  .video-panel-sub { font-size: 12px; color: var(--ink-muted); }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="../">← Map</a>
  <p class="topbar-title">Imagine Your Dream Studio</p>
  <div class="stops-pill">STEP 3 OF 12</div>
</div>

<div class="content-wrap">

  <div class="page-hero">
    <h1>What would YOU like inside your studio?</h1>
    <p>Pick 10–15 objects. You'll design each one next.</p>
  </div>

  <div class="objects-counter" id="objectsCounter">0 objects selected</div>
  <div class="objects-guidance" id="objectsGuidance">Pick at least 5</div>

  <div class="image-map-wrap" id="imageMapWrap">
    <img class="studio-image" src="https://imagedelivery.net/IoNSXjEbekGjbxAZrhrYGQ/3a1851dc-372a-4432-cd32-56f7e142d600/public" alt="Matisse-style illustrated studio full of objects to choose from">
    <div class="hotspot-layer" id="hotspotLayer"></div>
  </div>
  <div class="image-map-caption">Tap objects directly on the picture to select them.</div>

  <div id="videoPanelSlot"></div>

  <div class="selected-list" id="selectedList"></div>

  <div class="next-footer">
    <button class="btn btn-gold" onclick="goNext()">Design your objects →</button>
  </div>

</div>

<script>
const STEP_N = 3;
const MIN_SUGGESTED = 5;
let activeVideoObject = null;

// Rough estimates (per Faye) — left/top/width/height are all % of the
// image's own box, so they scale automatically with it at any size.
// Each hotspot also carries data-name in the rendered DOM for easy
// inspection/tuning in devtools.
const HOTSPOTS = [
  { name: 'Easel',            left: 2,  top: 2,  width: 14, height: 38 },
  { name: 'Framed Painting',  left: 16, top: 2,  width: 11, height: 25 },
  { name: 'Potted Plant',     left: 28, top: 2,  width: 10, height: 25 },
  { name: 'Blue Chair',       left: 40, top: 2,  width: 12, height: 32 },
  { name: 'Pink Cabinet',     left: 55, top: 0,  width: 18, height: 38 },
  { name: 'Yellow Armchair',  left: 2,  top: 35, width: 16, height: 30 },
  { name: 'Floor Lamp',       left: 18, top: 30, width: 8,  height: 32 },
  { name: 'Red Table',        left: 28, top: 30, width: 20, height: 28 },
  { name: 'Blue Figure',      left: 50, top: 32, width: 12, height: 25 },
  { name: 'Bust Sculpture',   left: 64, top: 30, width: 10, height: 28 },
  { name: 'Pink Rug',         left: 2,  top: 68, width: 16, height: 18 },
  { name: 'Bookshelf',        left: 18, top: 62, width: 14, height: 30 },
  { name: 'Cat',              left: 35, top: 62, width: 12, height: 15 },
  { name: 'Small Plant',      left: 48, top: 62, width: 10, height: 18 },
  { name: 'Window',           left: 60, top: 58, width: 18, height: 35 },
  { name: 'Fruit Bowl',       left: 2,  top: 85, width: 12, height: 14 },
  { name: 'Yellow Stool',     left: 32, top: 82, width: 10, height: 14 },
  { name: 'Matisse Books',    left: 44, top: 82, width: 14, height: 16 },
  { name: 'Paint Brushes',    left: 62, top: 85, width: 8,  height: 14 },
  { name: 'Black Figure',     left: 72, top: 5,  width: 6,  height: 12 },
];

function renderHotspots() {
  const data = DreamState.getStepData(STEP_N);
  const selected = data.selected || [];

  const layer = document.getElementById('hotspotLayer');
  layer.innerHTML = HOTSPOTS.map(h => `
    <div class="hotspot ${selected.includes(h.name) ? 'selected' : ''}"
         data-name="${h.name}"
         title="${h.name}"
         style="left:${h.left}%; top:${h.top}%; width:${h.width}%; height:${h.height}%;"
         onclick="toggleHotspot('${h.name}')">
    </div>
  `).join('');

  document.getElementById('objectsCounter').textContent =
    selected.length + ' object' + (selected.length === 1 ? '' : 's') + ' selected';

  const guidance = document.getElementById('objectsGuidance');
  if (selected.length >= MIN_SUGGESTED) {
    guidance.textContent = "You've got a great start!";
    guidance.classList.add('met');
  } else {
    guidance.textContent = 'Pick at least ' + MIN_SUGGESTED;
    guidance.classList.remove('met');
  }

  const listEl = document.getElementById('selectedList');
  listEl.innerHTML = selected.length === 0
    ? '<div class="selected-list-empty">Nothing selected yet.</div>'
    : selected.map(name => `<span class="selected-chip">${name}</span>`).join('');
}

function toggleHotspot(name) {
  const data = DreamState.getStepData(STEP_N);
  const selected = data.selected || [];
  const idx = selected.indexOf(name);
  if (idx === -1) selected.push(name);
  else selected.splice(idx, 1);

  // Stored as the exact object name (not a slug key) — Step 4/5 read
  // this same array via DreamState.getStepData(3).selected and already
  // fall back to showing the raw string as the label for any name they
  // don't have a curated icon for, so they display these new names
  // correctly with no changes needed there.
  DreamState.setStepData(STEP_N, { selected: selected });
  DreamState.markInProgress(STEP_N);
  activeVideoObject = name;
  renderHotspots();
  renderVideoPanel();
}

function renderVideoPanel() {
  const slot = document.getElementById('videoPanelSlot');
  if (!activeVideoObject) {
    slot.innerHTML = '';
    return;
  }
  slot.innerHTML = `
    <div class="video-panel">
      <button class="video-panel-close" onclick="closeVideoPanel()">✕ close</button>
      <div class="video-panel-play">▶️</div>
      <div class="video-panel-title">How to draw: ${activeVideoObject}</div>
      <div class="video-panel-sub">🎬 Faye's drawing tutorial coming soon</div>
    </div>
  `;
}

function closeVideoPanel() {
  activeVideoObject = null;
  renderVideoPanel();
}

function goNext() {
  DreamState.markCompleted(STEP_N);
  window.location.href = '../step-4/';
}

async function init() {
  if (window.FEIAccess) {
    try {
      await window.FEIAccess.init();
      const ok = await window.FEIAccess.gateLessonPage('creation', 'dream-art-studio');
      if (!ok) return;
    } catch (e) {
      console.warn('[init] gateLessonPage failed, continuing', e);
    }
  }
  DreamState.markVisited(STEP_N);
  renderHotspots();
}

init();
</script>
</body>
</html>
