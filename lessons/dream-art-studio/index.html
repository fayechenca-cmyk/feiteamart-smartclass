<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dream Art Studio · FEI TeamArt</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/studio-style.css">

<!-- Art GPS access control (loaded before this page's script so FEIAccess is available) -->
<script src="../../core/auth.js"></script>
<script src="../../core/access.js"></script>
<!-- Shared step/state module — also loaded by every step-N/index.html page -->
<script src="shared/studio-state.js"></script>

<style>
  html, body { overflow-x: hidden; }

  .hero { text-align: center; padding: 28px 24px 8px; }
  .hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px; font-weight: 900; margin: 0 0 6px;
    color: var(--ink);
  }
  .hero p {
    font-size: 13px; color: var(--ink-soft); margin: 0; max-width: 360px;
    margin-left: auto; margin-right: auto; line-height: 1.5;
  }

  /* ── MAP (vertical, winding — same pattern as the Illustration
     Book's adventure map, just with 12 stops and no separate
     finish node, since stop 12 "Gallery" is the finale itself) ── */
  .map-wrap {
    position: relative;
    max-width: 480px;
    margin: 20px auto 60px;
    padding: 0 24px;
  }
  @media (min-width: 768px) {
    .map-wrap { max-width: 620px; }
  }
  .map-path-svg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  .map-nodes {
    position: relative;
    height: 1900px; /* matches NODE_LAYOUT total span */
  }

  .step-node {
    position: absolute;
    width: 78px; height: 78px;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .step-node .node-circle {
    width: 100%; height: 100%;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    background: #fff;
    border: 3px solid var(--border);
    box-shadow: 0 6px 16px rgba(26,29,43,0.12);
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease, filter .2s ease;
    position: relative;
  }
  .step-node:active .node-circle { transform: scale(0.94); }

  .step-node.not_started .node-circle { filter: grayscale(0.55) opacity(0.65); border-color: var(--border); }
  .step-node.visited .node-circle { border-color: var(--gold); box-shadow: 0 6px 18px rgba(200,169,110,0.35); }
  .step-node.completed .node-circle { border-color: var(--green); box-shadow: 0 6px 18px rgba(29,158,117,0.32); }

  .step-node.recommended .node-circle {
    animation: nodeGlow 2.2s ease-in-out infinite;
  }
  @keyframes nodeGlow {
    0%, 100% { box-shadow: 0 6px 16px rgba(200,169,110,0.3), 0 0 0 0 rgba(200,169,110,0.5); }
    50% { box-shadow: 0 6px 20px rgba(200,169,110,0.45), 0 0 0 10px rgba(200,169,110,0); }
  }

  .step-node.gallery-node .node-circle {
    background: linear-gradient(135deg, var(--gold), #fff2d6);
    font-size: 36px;
  }

  .node-stamp {
    position: absolute; top: -8px; right: -8px;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transform: rotate(-12deg);
  }

  .node-label {
    position: absolute;
    top: calc(100% + 6px);
    left: 50%; transform: translateX(-50%);
    width: 110px;
    text-align: center;
    font-size: 10.5px; font-weight: 700;
    color: var(--ink-soft);
    line-height: 1.3;
  }
  .node-number {
    position: absolute; top: -6px; left: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--ink); color: #fff;
    font-size: 10px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── DETAIL SHEET (used for "coming soon" steps 6-12) ────── */
  .sheet-backdrop, .friction-backdrop {
    position: fixed; inset: 0; background: rgba(26,29,43,0.4);
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
    z-index: 90;
  }
  .sheet-backdrop.show, .friction-backdrop.show { opacity: 1; pointer-events: auto; }

  .detail-sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-width: 480px; margin: 0 auto;
    background: #fff;
    border-radius: 22px 22px 0 0;
    padding: 26px 26px 30px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
    transform: translateY(105%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
    z-index: 95;
  }
  .detail-sheet.show { transform: translateY(0); }
  .sheet-icon { font-size: 44px; margin-bottom: 10px; }
  .sheet-kicker {
    font-size: 10px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 4px;
  }
  .sheet-title {
    font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800;
    margin: 0 0 10px;
  }
  .sheet-desc { font-size: 13.5px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 16px; }
  .sheet-soon {
    display: inline-block; font-size: 10.5px; font-weight: 800; color: var(--ink-soft);
    background: rgba(26,29,43,0.06); border-radius: 20px; padding: 6px 12px; margin-bottom: 18px;
  }
  .sheet-btn {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: var(--ink); color: #fff; font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 13px; cursor: pointer;
  }

  /* ── WARM FRICTION BUBBLE (out-of-order jump within steps 1-5) ── */
  .friction-bubble {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    max-width: 340px; width: calc(100% - 48px);
    background: #fff; border-radius: 20px; padding: 24px 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 96;
    text-align: center;
  }
  .friction-bubble.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
  .friction-artchi { font-size: 40px; margin-bottom: 10px; }
  .friction-text { font-size: 14px; line-height: 1.55; color: var(--ink); margin-bottom: 18px; }
  .friction-actions { display: flex; flex-direction: column; gap: 8px; }
  .friction-btn {
    padding: 12px; border-radius: 12px; font-weight: 800; font-size: 12.5px;
    font-family: 'Montserrat', sans-serif; cursor: pointer; border: none;
  }
  .friction-btn.primary { background: var(--green); color: #fff; }
  .friction-btn.secondary { background: rgba(26,29,43,0.06); color: var(--ink); }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="../../creation/">← Studio</a>
  <p class="topbar-title">Dream Art Studio</p>
  <div class="stops-pill" id="stopsPill">0 of 12 stages completed</div>
</div>

<div class="hero">
  <h1>Build your own Dream Art Studio</h1>
  <p>Tap any stop on the path below. Go in order, or jump around — it's your journey.</p>
</div>

<div class="map-wrap" id="mapWrap">
  <svg class="map-path-svg" id="pathSvg"></svg>
  <div class="map-nodes" id="mapNodes"></div>
</div>

<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="detail-sheet" id="detailSheet">
  <div class="sheet-icon" id="sheetIcon"></div>
  <div class="sheet-kicker" id="sheetKicker"></div>
  <div class="sheet-title" id="sheetTitle"></div>
  <div class="sheet-desc" id="sheetDesc"></div>
  <div><span class="sheet-soon" id="sheetSoon">✨ Content coming soon</span></div>
  <button class="sheet-btn" onclick="closeSheet()">Got it</button>
</div>

<div class="friction-backdrop" id="frictionBackdrop"></div>
<div class="friction-bubble" id="frictionBubble">
  <div class="friction-artchi">💭</div>
  <div class="friction-text" id="frictionText"></div>
  <div class="friction-actions">
    <button class="friction-btn primary" id="frictionGoBtn"></button>
    <button class="friction-btn secondary" onclick="dismissFriction(false)">Stay here</button>
  </div>
</div>

<script>
/* ============================================================
 * Dream Art Studio — Landing Page & Step-Map
 *
 * STEPS / TOTAL_STEPS / DreamState come from shared/studio-state.js
 * (loaded in <head>). Steps 1-5 route to their own real, interactive
 * pages. Steps 6-12 are built (as lightweight "still being built"
 * pages, matching the Illustration Book convention, for direct-URL
 * safety) but tapping their map node shows the "coming soon" sheet
 * in place rather than navigating, per spec.
 * ============================================================ */

const FUNCTIONAL_LIMIT = 5; // steps 1-5 are real; 6-12 show "coming soon" on tap

// Winding vertical path — x alternates 50/76/50/24, y increases by 150.
const NODE_LAYOUT = STEPS.map((s, i) => {
  const xCycle = [50, 76, 50, 24];
  return { xPct: xCycle[i % 4], y: 70 + i * 150 };
});

let pendingFrictionStep = null;

function renderMap() {
  const state = DreamState.current();
  const recommended = DreamState.recommendedNext();
  const nodesContainer = document.getElementById('mapNodes');
  nodesContainer.innerHTML = '';

  STEPS.forEach((step, i) => {
    const pos = NODE_LAYOUT[i];
    const status = state.steps[step.n].status;
    const isRecommended = recommended === step.n && step.n <= FUNCTIONAL_LIMIT;
    const isGallery = step.n === TOTAL_STEPS;

    const node = document.createElement('div');
    node.className = 'step-node ' + status + (isRecommended ? ' recommended' : '') + (isGallery ? ' gallery-node' : '');
    node.style.left = pos.xPct + '%';
    node.style.top = pos.y + 'px';
    node.onclick = () => handleStepTap(step.n);

    node.innerHTML = `
      <div class="node-circle">
        <span class="node-number">${step.n}</span>
        ${step.icon}
        ${status === 'completed' ? '<span class="node-stamp">✓</span>' : ''}
      </div>
      <div class="node-label">${step.title}</div>
    `;
    nodesContainer.appendChild(node);
  });

  const lastPos = NODE_LAYOUT[NODE_LAYOUT.length - 1];
  document.getElementById('mapNodes').style.height = (lastPos.y + 140) + 'px';

  drawPath();
  updateStopsPill();
}

function updateStopsPill() {
  const count = DreamState.completedCount();
  document.getElementById('stopsPill').textContent = count + ' of ' + TOTAL_STEPS + ' stages completed';
}

// Draws a smooth dotted path through all node centers using the
// DOM-measured positions (robust to the container's actual rendered width).
function drawPath() {
  const svg = document.getElementById('pathSvg');
  const nodesContainer = document.getElementById('mapNodes');
  const containerRect = nodesContainer.getBoundingClientRect();
  svg.setAttribute('width', containerRect.width);
  svg.setAttribute('height', containerRect.height);

  const points = NODE_LAYOUT.map(p => ({ x: (p.xPct / 100) * containerRect.width, y: p.y }));
  if (points.length < 2) return;

  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i], p1 = points[i + 1];
    const midX = (p0.x + p1.x) / 2;
    d += ` Q ${p0.x} ${(p0.y + p1.y) / 2}, ${midX} ${(p0.y + p1.y) / 2}`;
    d += ` Q ${p1.x} ${(p0.y + p1.y) / 2}, ${p1.x} ${p1.y}`;
  }

  svg.innerHTML = `<path d="${d}" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
                    <path d="${d}" fill="none" stroke="var(--gold)" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 14"/>`;
}

/* ── Tap handling ──────────────────────────────────────────── */
function handleStepTap(n) {
  const step = STEPS.find(s => s.n === n);

  // Steps 6-12: not built yet — show "coming soon" in place, don't navigate.
  if (n > FUNCTIONAL_LIMIT) {
    openSheet(step.icon, 'COMING SOON', step.title,
      "This stage isn't built yet — it's on its way! The earlier stops are ready for you right now.");
    return;
  }

  // Steps 1-5: real pages. Jumping ahead of the recommended step gets a
  // warm nudge first (same pattern as the Illustration Book map).
  const recommended = DreamState.recommendedNext();
  const recommendedIdx = recommended === 'finished' ? FUNCTIONAL_LIMIT
    : Math.min(STEPS.findIndex(s => s.n === recommended), FUNCTIONAL_LIMIT - 1);
  const tappedIdx = STEPS.findIndex(s => s.n === n);

  if (recommended !== 'finished' && recommended <= FUNCTIONAL_LIMIT && tappedIdx > recommendedIdx) {
    pendingFrictionStep = n;
    showFriction(recommended, n);
    return;
  }

  openStep(n);
}

// Navigate to the step's own page. Each step-N/index.html marks itself
// "visited" on load — see shared/studio-state.js.
function openStep(n) {
  window.location.href = 'step-' + n + '/';
}

/* ── Detail sheet ─────────────────────────────────────────── */
function openSheet(icon, kicker, title, desc) {
  document.getElementById('sheetIcon').textContent = icon;
  document.getElementById('sheetKicker').textContent = kicker;
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetDesc').textContent = desc;
  document.getElementById('sheetBackdrop').classList.add('show');
  document.getElementById('detailSheet').classList.add('show');
}
function closeSheet() {
  document.getElementById('sheetBackdrop').classList.remove('show');
  document.getElementById('detailSheet').classList.remove('show');
}

/* ── Warm friction bubble (companion-model out-of-order jump) ── */
function showFriction(recommendedN, tappedN) {
  document.getElementById('frictionText').textContent =
    `Sure, we can peek at Step ${tappedN}. Some artists jump around. But Step ${recommendedN} will help make this way easier — want to go there first?`;
  const goBtn = document.getElementById('frictionGoBtn');
  goBtn.textContent = 'Go to Step ' + recommendedN;
  goBtn.onclick = () => dismissFriction(true);
  document.getElementById('frictionBackdrop').classList.add('show');
  document.getElementById('frictionBubble').classList.add('show');
}
function dismissFriction(goToRecommended) {
  document.getElementById('frictionBackdrop').classList.remove('show');
  document.getElementById('frictionBubble').classList.remove('show');
  const tapped = pendingFrictionStep;
  pendingFrictionStep = null;
  if (goToRecommended) {
    const recommended = DreamState.recommendedNext();
    if (recommended !== 'finished' && recommended <= FUNCTIONAL_LIMIT) openStep(recommended);
  } else if (tapped) {
    openStep(tapped);
  }
}

/* ── Bootstrap ─────────────────────────────────────────────── */
async function init() {
  // ─── PAYWALL GATE (Art GPS access control) ────────────────
  if (window.FEIAccess) {
    try {
      await window.FEIAccess.init();
      const ok = await window.FEIAccess.gateLessonPage('creation', 'dream-art-studio');
      if (!ok) return; // gateLessonPage already redirected to home
    } catch (e) {
      console.warn('[init] gateLessonPage failed, continuing', e);
    }
  }
  // ────────────────────────────────────────────────────────────

  renderMap();
  window.addEventListener('resize', () => { drawPath(); });
}

init();
</script>
</body>
</html>
