<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Step 4 · Customize Every Object · Dream Art Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/studio-style.css">

<!-- Art GPS access control (loaded before this page's script so FEIAccess is available) -->
<script src="../../../core/auth.js"></script>
<script src="../../../core/access.js"></script>
<!-- Shared step/state module -->
<script src="../shared/studio-state.js"></script>

<style>
  /* Canvas-collage background for this step only — matches the new
     landing page's Matisse paper-collage aesthetic (page-scoped
     override, same technique as Step 1's dark museum-wall background).
     Every shared class from studio-style.css (.card, .btn, etc.) and
     every interactive component below is untouched. */
  html, body {
    background-color: #d4c9a8;
    background-image:
      repeating-linear-gradient(0deg, rgba(139,119,80,0.06) 0px, rgba(139,119,80,0.06) 1px, transparent 1px, transparent 4px),
      repeating-linear-gradient(90deg, rgba(139,119,80,0.06) 0px, rgba(139,119,80,0.06) 1px, transparent 1px, transparent 4px);
    background-attachment: fixed;
  }
  .topbar { background: rgba(212,201,168,0.75); border-bottom: 1px solid rgba(44,30,16,0.15); }
  .back-link, .topbar-title { color: #2c1e10; }
  .stops-pill { background: rgba(255,255,255,0.55); border-color: rgba(44,30,16,0.15); color: #2c1e10; }
  .page-hero h1 { color: #2c1e10; }
  .page-hero p { color: #6d5440; }

  .objects-progress {
    text-align: center; font-size: 12.5px; font-weight: 800; color: var(--ink-soft);
    margin-bottom: 16px;
  }

  .empty-hint {
    text-align: center; font-size: 13px; color: var(--ink-soft);
    background: #fff; border-radius: 16px; padding: 20px; line-height: 1.6;
  }
  .empty-hint a { color: var(--gold); font-weight: 800; text-decoration: none; }

  /* ── Object accordion card ─────────────────────────────────── */
  .obj-card {
    background: #fff; border-radius: 18px; margin-bottom: 12px;
    box-shadow: 0 4px 16px rgba(26,29,43,0.08);
    overflow: hidden;
    border: 2px solid transparent;
  }
  .obj-card.done { border-color: rgba(29,158,117,0.4); }

  .obj-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 18px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .obj-card-header .oc-emoji { font-size: 26px; flex-shrink: 0; }
  .obj-card-header .oc-body { flex: 1; min-width: 0; }
  .obj-card-header .oc-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14.5px; }
  .obj-card-header .oc-summary {
    font-size: 12px; color: var(--ink-soft); margin-top: 2px; line-height: 1.4;
  }
  .obj-card-header .oc-check {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    background: var(--green); color: #fff; font-weight: 900; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .obj-card-header .oc-chevron { flex-shrink: 0; font-size: 13px; color: var(--ink-muted); transition: transform .2s ease; }
  .obj-card.expanded .oc-chevron { transform: rotate(180deg); }

  .obj-card-body {
    display: none;
    padding: 0 18px 20px;
  }
  .obj-card.expanded .obj-card-body { display: block; }

  .category-block { margin-bottom: 16px; }
  .category-label {
    font-size: 12.5px; font-weight: 800; color: var(--ink); margin-bottom: 8px;
  }
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .choice-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(26,29,43,0.05);
    border: 2px solid transparent;
    border-radius: 20px; padding: 8px 14px;
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: border-color .15s ease, background .15s ease, color .15s ease;
  }
  .choice-pill:active { transform: scale(0.96); }
  .choice-pill.selected {
    background: rgba(200,169,110,0.16); border-color: var(--gold); color: var(--ink);
  }
  .choice-pill .cp-dot {
    width: 8px; height: 8px; border-radius: 50%; border: 2px solid var(--ink-muted); flex-shrink: 0;
  }
  .choice-pill.selected .cp-dot { background: var(--gold); border-color: var(--gold); }

  .summary-box {
    background: rgba(200,169,110,0.1); border-radius: 14px; padding: 14px 16px;
    margin: 6px 0 16px;
  }
  .summary-box .sb-label {
    font-size: 10.5px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 5px;
  }
  .summary-box .sb-text { font-size: 13.5px; color: var(--ink); line-height: 1.55; font-style: italic; }
  .summary-box .sb-text.sb-empty { color: var(--ink-muted); font-style: normal; }

  .done-btn {
    width: 100%; padding: 13px; border: none; border-radius: 14px;
    background: var(--green); color: #fff; font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 13px; cursor: pointer;
  }
  .done-btn:active { transform: scale(0.98); }

  .skip-wrap { text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="../">← Map</a>
  <p class="topbar-title">Customize Every Object</p>
  <div class="stops-pill">STEP 4 OF 12</div>
</div>

<div class="content-wrap">

  <div class="page-hero">
    <h1>Design each object your own way</h1>
    <p>Tap through shape, color, pattern, material, and a little magic.</p>
  </div>

  <div class="objects-progress" id="objectsProgress"></div>

  <div id="objectsList"></div>

  <div id="emptyHintSlot"></div>

  <div class="next-footer" id="nextFooter" style="display:none;">
    <button class="btn btn-gold" id="continueBtn" onclick="goNext()">Time to draw! →</button>
    <div class="skip-wrap" id="skipWrap">
      <button class="btn btn-ghost" onclick="goNext()" style="font-size:12px; padding:10px;">Skip remaining</button>
    </div>
  </div>

</div>

<script>
const STEP_N = 4;

// Same object catalog as Step 3 (each page is self-contained, matching
// the rest of this course) — only icon/label are needed here.
const DREAM_OBJECTS = [
  { key: 'easel', icon: '🎨', label: 'Easel' },
  { key: 'plants', icon: '🪴', label: 'Plants' },
  { key: 'sofa', icon: '🛋', label: 'Sofa' },
  { key: 'chair', icon: '🪑', label: 'Chair' },
  { key: 'paintings', icon: '🖼', label: 'Paintings' },
  { key: 'cat', icon: '🐱', label: 'Cat' },
  { key: 'dog', icon: '🐶', label: 'Dog' },
  { key: 'toys', icon: '🧸', label: 'Toys' },
  { key: 'books', icon: '📚', label: 'Books' },
  { key: 'moon_window', icon: '🌙', label: 'Moon Window' },
  { key: 'whale', icon: '🐋', label: 'Whale' },
  { key: 'rainbow', icon: '🌈', label: 'Rainbow' },
  { key: 'piano', icon: '🎹', label: 'Piano' },
  { key: 'balloon', icon: '🎈', label: 'Balloon' },
  { key: 'butterfly', icon: '🦋', label: 'Butterfly' },
  { key: 'guitar', icon: '🎸', label: 'Guitar' },
  { key: 'vase', icon: '🏺', label: 'Vase' },
  { key: 'candles', icon: '🕯', label: 'Candles' },
  { key: 'mirror', icon: '🪞', label: 'Mirror' },
  { key: 'masks', icon: '🎭', label: 'Masks' },
];
const OBJECT_BY_KEY = {};
DREAM_OBJECTS.forEach(o => { OBJECT_BY_KEY[o.key] = o; });

const CATEGORIES = [
  { key: 'shape', label: 'Shape?', options: ['Round', 'Tall', 'Floating', 'Funny', 'Curved', 'Tiny', 'Giant'] },
  { key: 'color', label: 'Color?', options: ['Blue', 'Pink', 'Yellow', 'Green', 'Red', 'Rainbow', 'Monochrome', 'Gold'] },
  { key: 'pattern', label: 'Pattern?', options: ['Stars', 'Egyptian', 'Floral', 'Checkerboard', 'Dots', 'Stripes', 'Leaves', 'Plain'] },
  { key: 'material', label: 'Material?', options: ['Wood', 'Cloud', 'Glass', 'Fabric', 'Stone', 'Metal', 'Paper', 'Magic'] },
  { key: 'magic', label: 'Magic Detail?', options: ['Can fly', 'Changes color', 'Grows flowers', 'Has tiny wheels', 'Glows in dark', 'Plays music', 'Talks', 'Invisible sometimes'] },
];

// Small grammar helpers so the auto-generated sentence reads naturally —
// most options already work as plain lowercase adjectives, these three
// just fix the handful that wouldn't ("Wood" -> "wooden", "Stars" ->
// "star patterns", "Grows flowers" -> "can grow flowers").
const MATERIAL_ADJ = { Wood: 'wooden', Magic: 'magical' };
const PATTERN_NOUN = { Stars: 'star', Dots: 'dot', Stripes: 'stripe', Leaves: 'leaf' };
const MAGIC_VERB = {
  'Can fly': 'fly',
  'Changes color': 'change color',
  'Grows flowers': 'grow flowers',
  'Has tiny wheels': 'have tiny wheels',
  'Glows in dark': 'glow in the dark',
  'Plays music': 'play music',
  'Talks': 'talk',
  'Invisible sometimes': 'be invisible sometimes',
};

let expandedKey = null;

function buildSummary(objectLabel, c) {
  if (!c.shape || !c.color || !c.material || !c.pattern || !c.magic) return null;
  const material = (MATERIAL_ADJ[c.material] || c.material).toLowerCase();
  const patternWord = PATTERN_NOUN[c.pattern] || c.pattern;
  const pattern = patternWord === 'Egyptian' ? patternWord : patternWord.toLowerCase();
  const magic = MAGIC_VERB[c.magic] || c.magic.toLowerCase();
  return `A ${c.shape.toLowerCase()} ${c.color.toLowerCase()} ${material} ${objectLabel.toLowerCase()} `
    + `with ${pattern} patterns that can ${magic}.`;
}

function getCustomizations() {
  return DreamState.getStepData(STEP_N).customizations || {};
}

function renderList() {
  const selected = DreamState.getStepData(3).selected || [];
  const customizations = getCustomizations();
  const listEl = document.getElementById('objectsList');
  const emptyHintSlot = document.getElementById('emptyHintSlot');

  if (selected.length === 0) {
    listEl.innerHTML = '';
    emptyHintSlot.innerHTML = `
      <div class="empty-hint">You didn't pick any objects yet — <a href="../step-3/">go back to Step 3</a> to choose a few first.</div>
    `;
    document.getElementById('objectsProgress').textContent = '';
    document.getElementById('nextFooter').style.display = 'none';
    return;
  }
  emptyHintSlot.innerHTML = '';

  const doneCount = selected.filter(k => customizations[k] && customizations[k].done).length;
  document.getElementById('objectsProgress').textContent = doneCount + ' of ' + selected.length + ' objects designed';

  listEl.innerHTML = selected.map(key => {
    const obj = OBJECT_BY_KEY[key] || { icon: '✨', label: key };
    const c = customizations[key] || {};
    const isDone = !!c.done;
    const isExpanded = expandedKey === key;
    const summary = buildSummary(obj.label, c);

    return `
      <div class="obj-card ${isDone ? 'done' : ''} ${isExpanded ? 'expanded' : ''}" id="card-${key}">
        <div class="obj-card-header" onclick="toggleExpanded('${key}')">
          <div class="oc-emoji">${obj.icon}</div>
          <div class="oc-body">
            <div class="oc-name">Design Your ${obj.label}</div>
            ${isDone && summary ? `<div class="oc-summary">${summary}</div>` : ''}
          </div>
          ${isDone ? '<div class="oc-check">✓</div>' : '<div class="oc-chevron">▾</div>'}
        </div>
        <div class="obj-card-body">
          ${CATEGORIES.map(cat => `
            <div class="category-block">
              <div class="category-label">${cat.label}</div>
              <div class="pill-row">
                ${cat.options.map(opt => `
                  <div class="choice-pill ${c[cat.key] === opt ? 'selected' : ''}" onclick="event.stopPropagation(); selectOption('${key}', '${cat.key}', '${opt}')">
                    <span class="cp-dot"></span>${opt}
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
          <div class="summary-box">
            <div class="sb-label">✨ You designed</div>
            <div class="sb-text ${summary ? '' : 'sb-empty'}">${summary ? '"' + summary + '"' : 'Pick one option in every category to see your object come together.'}</div>
          </div>
          <button class="done-btn" onclick="event.stopPropagation(); markDone('${key}')" ${summary ? '' : 'disabled style="opacity:0.5;"'}>✓ Done with this object</button>
        </div>
      </div>
    `;
  }).join('');

  const footer = document.getElementById('nextFooter');
  const skipWrap = document.getElementById('skipWrap');
  if (doneCount > 0) {
    footer.style.display = 'block';
    skipWrap.style.display = doneCount >= selected.length ? 'none' : 'block';
  } else {
    footer.style.display = 'none';
  }
}

function toggleExpanded(key) {
  expandedKey = (expandedKey === key) ? null : key;
  renderList();
  if (expandedKey) {
    const el = document.getElementById('card-' + key);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function selectOption(key, categoryKey, option) {
  const customizations = getCustomizations();
  const current = customizations[key] || {};
  current[categoryKey] = option;
  customizations[key] = current;
  DreamState.setStepData(STEP_N, { customizations: customizations });
  DreamState.markInProgress(STEP_N);
  renderList();
}

function markDone(key) {
  const customizations = getCustomizations();
  const current = customizations[key] || {};
  current.done = true;
  customizations[key] = current;
  DreamState.setStepData(STEP_N, { customizations: customizations });

  // Auto-advance the accordion to the next not-yet-done object.
  const selected = DreamState.getStepData(3).selected || [];
  const next = selected.find(k => k !== key && !(customizations[k] && customizations[k].done));
  expandedKey = next || null;

  const allDone = selected.every(k => customizations[k] && customizations[k].done);
  if (allDone) DreamState.markCompleted(STEP_N);

  renderList();
}

function goNext() {
  DreamState.markCompleted(STEP_N);
  window.location.href = '../step-5/';
}

async function init() {
  if (window.FEIAccess) {
    try {
      await window.FEIAccess.init();
      const ok = await window.FEIAccess.gateLessonPage('creation', 'dream-art-studio');
      if (!ok) return;
    } catch (e) {
      console.warn('[init] gateLessonPage failed, continuing', e);
    }
  }
  DreamState.markVisited(STEP_N);

  // Default the accordion open on the first not-yet-done object.
  const selected = DreamState.getStepData(3).selected || [];
  const customizations = getCustomizations();
  expandedKey = selected.find(k => !(customizations[k] && customizations[k].done)) || null;

  renderList();
}

init();
</script>
</body>
</html>
