<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEI TeamArt · Foundation of Sketch A · Preparation</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #1a1d2b;
    --ink-soft: rgba(26, 29, 43, 0.65);
    --ink-faint: rgba(26, 29, 43, 0.45);
    --ink-veryfaint: rgba(26, 29, 43, 0.15);
    --paper: #fafaf8;
    --paper-soft: #f5f5f7;
    --gold: #c8a96e;
    --green: #1d9e75;
    --purple: #a78bfa;
    --cyan: #67e8f9;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 18px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.10);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--ink-veryfaint);
    position: sticky; top: 0; z-index: 100;
  }
  .brand {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 14px; color: var(--ink);
    text-decoration: none; letter-spacing: 0.3px;
  }
  .brand-mark { color: var(--purple); margin-right: 4px; }
  .back-home {
    background: none; border: 1px solid var(--ink-veryfaint);
    border-radius: 16px; padding: 6px 12px; font-size: 11px;
    font-family: 'Montserrat', sans-serif; font-weight: 700;
    color: var(--ink-soft); cursor: pointer; letter-spacing: 0.3px;
    text-decoration: none;
  }
  .back-home:hover { background: var(--paper-soft); color: var(--ink); }

  .progress-bar {
    position: sticky; top: 56px; z-index: 90;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 12px 20px 14px;
    border-bottom: 1px solid var(--ink-veryfaint);
  }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .progress-meta-left { color: var(--purple); }
  .progress-meta-right { color: var(--ink-soft); }
  .progress-track {
    height: 5px; background: var(--ink-veryfaint);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
    border-radius: 3px;
    transition: width 0.4s ease-out;
  }

  .container {
    max-width: 580px; margin: 0 auto; padding: 24px 18px 60px;
  }

  .step-card {
    background: #fff;
    border-radius: var(--radius-lg);
    padding: 28px 22px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--ink-veryfaint);
    margin-bottom: 20px;
    animation: cardFadeIn 0.4s ease-out;
  }
  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-emoji {
    text-align: center;
    font-size: 48px;
    margin-bottom: 14px;
  }
  .step-kicker {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 900;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 8px;
    text-align: center;
  }
  .step-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px; font-weight: 900;
    text-align: center;
    margin-bottom: 12px;
    color: var(--ink);
    line-height: 1.3;
  }
  .step-subtitle {
    font-size: 13.5px;
    color: var(--ink-soft);
    text-align: center;
    margin-bottom: 24px;
    max-width: 440px;
    margin-left: auto; margin-right: auto;
  }

  .step-body p {
    font-size: 14.5px; color: var(--ink);
    line-height: 1.75;
    margin-bottom: 14px;
  }
  .step-body strong { color: var(--purple); }
  .step-body em { color: var(--ink-soft); }

  .step-body ul {
    padding-left: 22px;
    margin-bottom: 14px;
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.85;
  }
  .step-body li { margin-bottom: 6px; }

  .materials-list {
    list-style: none;
    padding: 0;
    margin-bottom: 18px;
  }
  .materials-list li {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px;
    background: var(--paper-soft);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
  }
  .materials-list .mat-emoji {
    font-size: 22px; flex-shrink: 0;
    width: 30px; text-align: center;
  }
  .materials-list .mat-info { flex: 1; }
  .materials-list .mat-name {
    font-family: 'Montserrat', sans-serif; font-size: 13.5px;
    font-weight: 800; margin-bottom: 2px;
  }
  .materials-list .mat-desc {
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.5;
  }

  .video-card {
    margin-bottom: 18px; border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--ink-veryfaint);
  }
  .video-label {
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    color: #fff;
    padding: 10px 16px;
    font-family: 'Montserrat', sans-serif; font-size: 10px;
    font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .video-label.optional {
    background: linear-gradient(135deg, var(--gold), #d4b884);
  }
  .video-embed {
    position: relative; padding-top: 56.25%;
    background: #000;
  }
  .video-embed iframe {
    border: none; position: absolute; top: 0; left: 0;
    height: 100%; width: 100%;
  }
  .video-caption {
    padding: 14px 16px; background: #fff;
    font-size: 13px; color: var(--ink-soft); line-height: 1.6;
  }
  .video-caption strong { color: var(--ink); }

  .hand-card {
    background: #fff;
    border-radius: var(--radius-md);
    border: 1px solid var(--ink-veryfaint);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .hand-card-label {
    background: linear-gradient(135deg, var(--green), #4cb892);
    color: #fff;
    padding: 8px 14px;
    font-family: 'Montserrat', sans-serif; font-size: 10px;
    font-weight: 800; letter-spacing: 1.3px; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
  }
  .hand-card-tag {
    background: rgba(255,255,255,0.25);
    padding: 3px 10px; border-radius: 10px;
    font-size: 9px;
    flex-shrink: 0;
  }
  .hand-card-img {
    width: 100%; height: auto; display: block;
    background: var(--paper-soft);
  }
  .hand-card-caption {
    padding: 12px 16px;
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.6;
    border-top: 1px solid var(--ink-veryfaint);
  }
  .hand-card-caption strong { color: var(--ink); }

  .tip-callout {
    background: rgba(200,169,110,0.08);
    border-left: 3px solid var(--gold);
    padding: 14px 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom: 16px;
  }
  .tip-callout-label {
    font-family: 'Montserrat', sans-serif; font-size: 10px;
    font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px;
  }
  .tip-callout-text {
    font-size: 13px; color: var(--ink); line-height: 1.65;
  }

  .optional-tag {
    display: inline-block;
    background: rgba(200,169,110,0.15);
    color: var(--gold);
    padding: 4px 12px;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif; font-size: 10px;
    font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 12px;
  }

  .placeholder {
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, var(--paper-soft), #f5f3ff);
    border: 2px dashed rgba(167,139,250,0.4);
    border-radius: var(--radius-md);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin-bottom: 14px; padding: 20px;
    text-align: center;
  }
  .placeholder-icon { font-size: 30px; opacity: 0.6; margin-bottom: 8px; }
  .placeholder-label {
    font-family: 'Montserrat', sans-serif; font-size: 11px;
    font-weight: 800; color: var(--purple); letter-spacing: 1.2px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .placeholder-note {
    font-size: 11.5px; color: var(--ink-soft); font-style: italic;
  }

  .step-nav {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .btn {
    padding: 13px 20px;
    border-radius: 24px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 12.5px;
    letter-spacing: 0.6px;
    cursor: pointer;
    border: none;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--ink);
    color: #fff;
    box-shadow: var(--shadow-md);
    flex: 1;
    max-width: 240px;
    padding: 14px 24px;
    font-size: 13px;
  }
  .btn-primary:hover:not(:disabled) {
    background: #2a2f42;
    transform: translateY(-1px);
    box-shadow: var(--shadow-lg);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-ghost {
    background: none;
    color: var(--ink-soft);
    padding: 10px 14px;
    font-size: 11.5px;
  }
  .btn-ghost:hover:not(:disabled) { color: var(--ink); }
  .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

  .step-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ink-veryfaint);
    transition: all 0.2s;
    cursor: pointer;
  }
  .step-dot.done { background: var(--green); }
  .step-dot.current {
    background: var(--purple);
    width: 22px;
    border-radius: 4px;
  }
  .step-dot:hover { transform: scale(1.2); }

  .complete-card {
    background: linear-gradient(135deg, #f0fdf4 0%, #ecfeff 100%);
    border: 2px solid rgba(29,158,117,0.3);
  }
  .complete-icon {
    font-size: 64px;
    text-align: center;
    margin-bottom: 12px;
    animation: completePop 0.6s ease-out;
  }
  @keyframes completePop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  @media (max-width: 480px) {
    .step-title { font-size: 21px; }
    .step-card { padding: 22px 18px; }
    .btn-primary { font-size: 12.5px; padding: 13px 18px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="../../" class="brand"><span class="brand-mark">●</span> FEI · Art GPS</a>
  <a href="../../" class="back-home">← Back to map</a>
</div>

<div class="progress-bar">
  <div class="progress-meta">
    <span class="progress-meta-left" id="step-counter">Step 1 of 10</span>
    <span class="progress-meta-right">🎒 Preparation</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width: 10%"></div>
  </div>
</div>

<div class="container">
  <div class="step-dots" id="step-dots"></div>
  <div id="step-content"></div>
</div>

<script>
  const PROFILE_KEY = 'fei_user_profile';
  const PREP_STEP_KEY = 'fei_prep_current_step';
  const TOTAL_STEPS = 10;

  let currentStep = 1;
  try {
    const saved = localStorage.getItem(PREP_STEP_KEY);
    if (saved) {
      const n = parseInt(saved, 10);
      if (n >= 1 && n <= TOTAL_STEPS) currentStep = n;
    }
  } catch (e) {}

  const STEPS = [
    // ────────────────────────────────────────────────────────────
    // STEP 1: Welcome & Intro
    // ────────────────────────────────────────────────────────────
    {
      id: 'welcome',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">🎒</div>' +
          '<div class="step-kicker">✨ Step 1 · Welcome</div>' +
          '<h1 class="step-title">Before you draw</h1>' +
          '<p class="step-subtitle">A short, friendly walk-through to get you set up and ready — before your first real lesson begins.</p>' +
          '<div class="step-body">' +
          '<p><strong>Welcome!</strong> This is your preparation — a calm walk-through that gets you fully ready before you start <strong>Lesson 1: The Cube</strong>.</p>' +
          '<p>Here we focus on the small things that make a big difference: your materials, your workspace, your hand position, and your first warm-up shapes. You don\'t need experience — just curiosity.</p>' +
          '<p><strong>Why this comes first:</strong> The Cube lesson moves quickly into real drawing. If your pencil, posture, and paper are already sorted out, you can focus on the art — not the setup.</p>' +
          '</div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 2: Materials list — Round 38 #1.2 full pencil range + REQUIRED blender
    //        + Faye's uploaded materials photo
    // ────────────────────────────────────────────────────────────
    {
      id: 'materials',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">📦</div>' +
          '<div class="step-kicker">Step 2 · What you\'ll need</div>' +
          '<h2 class="step-title">Materials</h2>' +
          '<p class="step-subtitle">Gather these before you start the cube lesson.</p>' +
          '<div class="step-body">' +
          '<ul class="materials-list">' +
          '<li><span class="mat-emoji">✏️</span><div class="mat-info"><div class="mat-name">Pencils — 2H, HB, 2B, 3B, 4B, 6B</div><div class="mat-desc">Six grades cover everything: 2H for lightest construction, HB for sketching, 2B–6B for shading from medium to deepest darks.</div></div></li>' +
          '<li><span class="mat-emoji">📄</span><div class="mat-info"><div class="mat-name">Sketch paper</div><div class="mat-desc">Smooth or lightly textured sketch paper. A4 or letter size works well to start. Not just printer paper — sketch paper holds graphite better.</div></div></li>' +
          '<li><span class="mat-emoji">🧻</span><div class="mat-info"><div class="mat-name">Blending tool <strong>(required)</strong></div><div class="mat-desc">A blending stump or blending tissue. Used to soften and unify tones in every shading lesson — this is not optional.</div></div></li>' +
          '<li><span class="mat-emoji">🧽</span><div class="mat-info"><div class="mat-name">Eraser (kneaded + regular)</div><div class="mat-desc">Kneaded eraser for lifting, regular eraser for sharper corrections.</div></div></li>' +
          '<li><span class="mat-emoji">🖼️</span><div class="mat-info"><div class="mat-name">Easel or angled surface <em>(optional)</em></div><div class="mat-desc">Helps reduce perspective distortion. A simple desk works too.</div></div></li>' +
          '<li><span class="mat-emoji">🩹</span><div class="mat-info"><div class="mat-name">Masking tape / artist tape <em>(optional)</em></div><div class="mat-desc">For taping down your paper — covered in a later step.</div></div></li>' +
          '</ul>' +

          '<div class="hand-card">' +
            '<div class="hand-card-label">' +
              '<span>Materials overview</span>' +
              '<span class="hand-card-tag">✅ Ready</span>' +
            '</div>' +
            '<img class="hand-card-img" src="https://cdn.prod.website-files.com/67b17a6580f358f0c7dd29f4/6a173bd23acbf487b452a628_49dc1cbc-f5e2-4aa3-a113-5d89a228a165.png" alt="Materials laid out for the preparation lesson" loading="lazy">' +
            '<div class="hand-card-caption">' +
              '<strong>Materials overview.</strong> This is the set of tools prepared before starting the lesson.' +
            '</div>' +
          '</div>' +

          '</div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 3: Workspace setup video (with Round 38 muted=true)
    // ────────────────────────────────────────────────────────────
    {
      id: 'workspace',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">🪑</div>' +
          '<div class="step-kicker">Step 3 · Set up your space</div>' +
          '<h2 class="step-title">Workspace setup</h2>' +
          '<p class="step-subtitle">Watch the teacher position the easel and arrange materials.</p>' +
          '<div class="step-body">' +
          '<div class="video-card">' +
          '<div class="video-label">🎬 Workspace setup</div>' +
          '<div class="video-embed">' +
          '<iframe src="https://customer-a78os4oj56dr67ab.cloudflarestream.com/9b335ebd533cbfdab6a608255a1c202c/iframe?muted=true&poster=https%3A%2F%2Fcustomer-a78os4oj56dr67ab.cloudflarestream.com%2F9b335ebd533cbfdab6a608255a1c202c%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600" loading="lazy" title="Workspace setup" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen="true"></iframe>' +
          '</div>' +
          '<div class="video-caption">A practical setup demonstration: positioning the easel on the desk, arranging materials, and getting everything ready before drawing.</div>' +
          '</div></div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 4: Optional paper taping (with Round 38 muted=true)
    // ────────────────────────────────────────────────────────────
    {
      id: 'taping',
      canSkip: true,
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">🩹</div>' +
          '<div style="text-align:center;"><span class="optional-tag">🎯 Optional · Skip if you like</span></div>' +
          '<div class="step-kicker">Step 4 · Tape your paper</div>' +
          '<h2 class="step-title">Paper taping</h2>' +
          '<p class="step-subtitle">Optional — for steady paper and clean edges.</p>' +
          '<div class="step-body">' +
          '<p>Some artists tape their paper down before drawing — it keeps the page steady and creates clean borders.</p>' +
          '<div class="video-card">' +
          '<div class="video-label optional">🎬 Optional · Taping technique</div>' +
          '<div class="video-embed">' +
          '<iframe src="https://customer-a78os4oj56dr67ab.cloudflarestream.com/5fee79867ca52d1ec9b26654bb3bc0e5/iframe?muted=true&poster=https%3A%2F%2Fcustomer-a78os4oj56dr67ab.cloudflarestream.com%2F5fee79867ca52d1ec9b26654bb3bc0e5%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600" loading="lazy" title="Optional taping technique" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen="true"></iframe>' +
          '</div>' +
          '<div class="video-caption"><strong>You don\'t have to copy this exactly.</strong> You can tape only the four edges, or tape more completely like the teacher does. A more complete taping is usually used when the full artwork includes the background.</div>' +
          '</div>' +
          '<div class="tip-callout">' +
          '<div class="tip-callout-label">💡 For first-time drawers</div>' +
          '<div class="tip-callout-text">If you\'re just doing the cube exercise, taping the four edges is plenty. Save the full taping for when you\'re building a complete artwork with background.</div>' +
          '</div></div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 5: Posture & readiness — Faye's uploaded posture photo
    // ────────────────────────────────────────────────────────────
    {
      id: 'posture',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">🧘</div>' +
          '<div class="step-kicker">Step 5 · Get comfortable</div>' +
          '<h2 class="step-title">Posture & readiness</h2>' +
          '<p class="step-subtitle">A relaxed body draws better lines.</p>' +
          '<div class="step-body">' +
          '<p>Before you start:</p>' +
          '<ul>' +
          '<li>Sit comfortably, with your back relaxed.</li>' +
          '<li>Keep your drawing surface in front of you.</li>' +
          '<li>Keep your arm free to move — drawing isn\'t just from the wrist. It\'s from the shoulder for big strokes and from the fingers for details.</li>' +
          '<li>Take a breath. The next 30 minutes are yours.</li>' +
          '</ul>' +

          '<div class="hand-card">' +
            '<div class="hand-card-label">' +
              '<span>Posture reference</span>' +
              '<span class="hand-card-tag">✅ Ready</span>' +
            '</div>' +
            '<img class="hand-card-img" src="https://cdn.prod.website-files.com/67b17a6580f358f0c7dd29f4/6a1744e99dc910c955275058_7c903390-e353-4b11-a93f-7300224101e1.png" alt="Good drawing posture reference" loading="lazy">' +
            '<div class="hand-card-caption">' +
              '<strong>Posture reference.</strong> Sit in a relaxed, balanced way so your hand and arm can move freely while drawing.' +
            '</div>' +
          '</div>' +

          '</div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 6: Pencil grip (3 hand images)
    // ────────────────────────────────────────────────────────────
    {
      id: 'pencil-grip',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">✋</div>' +
          '<div class="step-kicker">Step 6 · How to hold the pencil</div>' +
          '<h2 class="step-title">Pencil grip</h2>' +
          '<p class="step-subtitle">Three hand positions — all of them are acceptable.</p>' +
          '<div class="step-body">' +
          '<p>There isn\'t <em>one</em> correct grip — there are several that work well. Pick the one that feels natural and matches what you\'re drawing.</p>' +
          '<div class="hand-card">' +
          '<div class="hand-card-label"><span>① Large-scale grip</span><span class="hand-card-tag">⭐ Featured</span></div>' +
          '<img class="hand-card-img" src="https://cdn.prod.website-files.com/67b17a6580f358f0c7dd29f4/6a1611d4701f5219d08ad295_righthand%20b%20.PNG" alt="Large-scale recommended pencil grip" loading="lazy">' +
          '<div class="hand-card-caption"><strong>Great for large-scale drawing.</strong> Hold the pencil farther from the tip — more arm freedom, lighter sweeping strokes.</div>' +
          '</div>' +
          '<div class="hand-card">' +
          '<div class="hand-card-label"><span>② Left-handed version</span><span class="hand-card-tag">✅ OK</span></div>' +
          '<img class="hand-card-img" src="https://cdn.prod.website-files.com/67b17a6580f358f0c7dd29f4/6a1611cc755582b77735ac6b_lefthanded%20canbe.png" alt="Acceptable left-handed pencil grip" loading="lazy">' +
          '<div class="hand-card-caption"><strong>For left-handed students:</strong> this grip works well and feels natural.</div>' +

          '<div class="hand-card">' +
          '<div class="hand-card-label"><span>③ Right-handed version</span><span class="hand-card-tag">✅ OK</span></div>' +

          '<div class="hand-card-caption"><strong>For right-handed students:</strong> a comfortable, close-to-the-tip grip for more precise control.</div>' +

          '<div class="tip-callout">' +
          '<div class="tip-callout-label">💡 The key thing to notice</div>' +
          '<div class="tip-callout-text">Pay attention to the distance between your hand grip and the pencil tip. Closer = more precision but stiffer lines. Farther = more freedom but less detail control.</div>' +
          '</div></div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 7: Hatching Practice — Faye's uploaded hatching image + 5 ideas
    // ────────────────────────────────────────────────────────────
    {
      id: 'simple-shapes',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">✏️</div>' +
          '<div class="step-kicker">Step 7 · Warm up your shading</div>' +
          '<h2 class="step-title">Hatching Practice</h2>' +
          '<p class="step-subtitle">A few simple shading movements to practice before drawing real objects.</p>' +
          '<div class="step-body">' +
          '<p><strong>Before drawing objects, it always helps to practice hatching.</strong> These are basic shading movements that will appear again and again in later drawing lessons.</p>' +
          '<p>Take a sheet of paper and warm up your hand for a few minutes. Focus on keeping your pencil relaxed and your marks controlled.</p>' +

          '<div class="hand-card">' +
            '<div class="hand-card-label">' +
              '<span>Hatching practice</span>' +
              '<span class="hand-card-tag">✅ Warm-up</span>' +
            '</div>' +
            '<img class="hand-card-img" src="https://cdn.prod.website-files.com/67b17a6580f358f0c7dd29f4/6a1880406bc19dd503f1455b_hatching.png" alt="Hatching practice reference" loading="lazy">' +
            '<div class="hand-card-caption">' +
              '<strong>Hatching practice.</strong> Use this page to warm up your shading control before starting the lesson.' +
            '</div>' +
          '</div>' +

          '<p>As you practice, pay attention to these five ideas:</p>' +
          '<ul>' +
          '<li><strong>Coverage</strong> — how much of the area your pencil marks fill.</li>' +
          '<li><strong>Direction</strong> — keeping your lines flowing in a clear and consistent way.</li>' +
          '<li><strong>Gradation</strong> — moving gradually from light to dark.</li>' +
          '<li><strong>Layering</strong> — building tone step by step instead of pressing too hard at once.</li>' +
          '<li><strong>Control</strong> — making repeated marks with steadiness and patience.</li>' +
          '</ul>' +

          '<div class="tip-callout">' +
          '<div class="tip-callout-label">💡 Daily warm-up</div>' +
          '<div class="tip-callout-text">Spend a few minutes each day making hatching rows, light-to-dark transitions, and layered pencil strokes on scrap paper. This small habit builds smoother shading and stronger control over time.</div>' +
          '</div></div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 8: Basic Perspective — Faye's uploaded 2 perspective images
    // ────────────────────────────────────────────────────────────
    {
      id: 'perspective',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">🔭</div>' +
          '<div class="step-kicker">Step 8 · Bridge to the cube</div>' +
          '<h2 class="step-title">Basic Perspective</h2>' +
          '<p class="step-subtitle">The smallest amount of perspective you need before the cube.</p>' +
          '<div class="step-body">' +
          '<p>You don\'t need to learn full perspective theory before the cube lesson. But here\'s the one idea worth knowing:</p>' +
          '<p><strong>Things farther from your eye look smaller. Lines that go away from you appear to converge.</strong></p>' +
          '<p>That\'s it. The cube lesson will show you how to use this in practice — for now, just keep this idea in the back of your mind.</p>' +

          '<div class="hand-card">' +
            '<div class="hand-card-label">' +
              '<span>Perspective reference 1</span>' +
              '<span class="hand-card-tag">✅ Ready</span>' +
            '</div>' +
            '<img class="hand-card-img" src="https://cdn.prod.website-files.com/67b17a6580f358f0c7dd29f4/6a174ca901e24bf3475f7a56_61d1abd4-697a-46e7-b39b-b8357f3d686b.png" alt="Basic perspective reference image 1" loading="lazy">' +
            '<div class="hand-card-caption">' +
              '<strong>Perspective reference.</strong> This image introduces the basic idea of how forms begin to turn and move in space.' +
            '</div>' +
          '</div>' +

          '<div class="hand-card">' +
            '<div class="hand-card-label">' +
              '<span>Perspective reference 2</span>' +
              '<span class="hand-card-tag">✅ Ready</span>' +
            '</div>' +
            '<img class="hand-card-img" src="https://cdn.prod.website-files.com/67b17a6580f358f0c7dd29f4/6a174e06c08d0acccb668f11_perspective%202.png" alt="Basic perspective reference image 2" loading="lazy">' +
            '<div class="hand-card-caption">' +
              '<strong>Perspective reference.</strong> This second image continues the idea and helps students connect the concept more clearly before moving into the cube lesson.' +
            '</div>' +
          '</div>' +

          '<div class="tip-callout">' +
          '<div class="tip-callout-label">💡 Notice it everywhere</div>' +
          '<div class="tip-callout-text">Look at a road, a hallway, or a row of books. Notice how parallel lines seem to lean toward a single point in the distance. You already know this — drawing just makes you put it on paper.</div>' +
          '</div></div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 9: Hand warm-up — Faye's uploaded video (with Round 38 muted=true)
    // ────────────────────────────────────────────────────────────
    {
      id: 'hand-warmup',
      render: function() {
        return '<div class="step-card">' +
          '<div class="step-emoji">👋</div>' +
          '<div class="step-kicker">Step 9 · Wake up your hand</div>' +
          '<h2 class="step-title">Hand warm-up</h2>' +
          '<p class="step-subtitle">A final warm-up before you begin the cube lesson.</p>' +
          '<div class="step-body">' +
          '<p>Before drawing, give your hand a short moment to loosen up:</p>' +
          '<ul>' +
          '<li>Open and close your fist <strong>10 times</strong>.</li>' +
          '<li>Wiggle each finger separately.</li>' +
          '<li>Roll your wrist slowly in both directions.</li>' +
          '<li>Hold your pencil and make <strong>10 free squiggles</strong> on scratch paper.</li>' +
          '</ul>' +
          '<div class="video-card">' +
            '<div class="video-label">🎬 Hand warm-up</div>' +
            '<div class="video-embed">' +
              '<iframe src="https://customer-a78os4oj56dr67ab.cloudflarestream.com/cf7834125b757d86d0965702c6550202/iframe?muted=true&poster=https%3A%2F%2Fcustomer-a78os4oj56dr67ab.cloudflarestream.com%2Fcf7834125b757d86d0965702c6550202%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600" loading="lazy" title="Hand warm-up" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen="true"></iframe>' +
            '</div>' +
            '<div class="video-caption"><strong>Hand warm-up demonstration.</strong> Follow along to loosen your fingers, wrist, and arm before starting the lesson.</div>' +
          '</div>' +
          '<div class="tip-callout">' +
          '<div class="tip-callout-label">💡 Why this matters</div>' +
          '<div class="tip-callout-text">A stiff hand makes stiff lines. A relaxed hand makes smoother, more confident marks. This is the last small reset before you begin drawing.</div>' +
          '</div></div></div>';
      }
    },

    // ────────────────────────────────────────────────────────────
    // STEP 10: Ready → Continue to Cube
    // ────────────────────────────────────────────────────────────
    {
      id: 'ready',
      render: function() {
        return '<div class="step-card complete-card">' +
          '<div class="complete-icon">✅</div>' +
          '<div class="step-kicker" style="color: var(--green);">Step 10 · You\'re ready</div>' +
          '<h2 class="step-title">Preparation complete</h2>' +
          '<p class="step-subtitle">Your space is set, your hand is loose, your pencil is in position. Time to draw.</p>' +
          '<div class="step-body">' +
          '<p style="text-align: center;">Now you have everything you need to begin the first real lesson.</p>' +
          '<p style="text-align: center;"><strong>The Cube</strong> is your starting point — three planes, one light, the simplest geometric form. Take what you set up here, and bring it to your paper.</p>' +
          '<div style="text-align: center; margin-top: 28px;">' +
          '<a href="../lesson-3-cube/" class="btn btn-primary" style="max-width: none; padding: 16px 28px; font-size: 14px; display: inline-flex;">◈ Continue to Lesson 1: The Cube →</a>' +
          '</div>' +
          '<div style="text-align: center; margin-top: 14px;">' +
          '<a href="../../" class="btn btn-ghost" style="display: inline-block;">← Back to Art GPS home</a>' +
          '</div>' +
          '</div></div>';
      }
    }
  ];

  function renderStepDots() {
    const dotsEl = document.getElementById('step-dots');
    let html = '';
    for (let i = 1; i <= TOTAL_STEPS; i++) {
      let cls = '';
      if (i < currentStep) cls = 'done';
      else if (i === currentStep) cls = 'current';
      html += '<div class="step-dot ' + cls + '" title="Step ' + i + '" onclick="jumpToStep(' + i + ')"></div>';
    }
    dotsEl.innerHTML = html;
  }

  function renderCurrentStep() {
    const step = STEPS[currentStep - 1];

    document.getElementById('step-counter').textContent = 'Step ' + currentStep + ' of ' + TOTAL_STEPS;
    document.getElementById('progress-fill').style.width = ((currentStep / TOTAL_STEPS) * 100) + '%';

    renderStepDots();

    const contentEl = document.getElementById('step-content');
    const navHTML = renderNavButtons();
    contentEl.innerHTML = step.render() + navHTML;

    window.scrollTo({ top: 0, behavior: 'smooth' });

    try { localStorage.setItem(PREP_STEP_KEY, String(currentStep)); } catch (e) {}

    if (currentStep === TOTAL_STEPS) {
      markPreparationComplete();
    }
  }

  function renderNavButtons() {
    const step = STEPS[currentStep - 1];
    const isFirst = currentStep === 1;
    const isLast = currentStep === TOTAL_STEPS;

    if (isLast) {
      return '<div class="step-nav">' +
        '<button class="btn btn-ghost" onclick="prevStep()"' + (isFirst ? ' disabled' : '') + '>← Previous</button>' +
        '<div style="flex:1"></div>' +
        '</div>';
    }

    const skipBtn = step.canSkip ?
      '<button class="btn btn-ghost" onclick="nextStep()" style="font-style:italic;">Skip</button>' :
      '<div style="width:60px"></div>';

    return '<div class="step-nav">' +
      '<button class="btn btn-ghost" onclick="prevStep()"' + (isFirst ? ' disabled' : '') + '>← Previous</button>' +
      '<button class="btn btn-primary" onclick="nextStep()">Continue →</button>' +
      skipBtn +
      '</div>';
  }

  // Round 38 #1.1 — button sound feedback (consistent with later lessons)
  let _soundOn = true;
  function playTone(freq, dur) {
    if (!_soundOn) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  function nextStep() {
    if (currentStep < TOTAL_STEPS) {
      playTone(660, 0.08);  // gentle "forward" click
      currentStep++;
      renderCurrentStep();
    }
  }
  window.nextStep = nextStep;

  function prevStep() {
    if (currentStep > 1) {
      playTone(440, 0.08);  // gentle "back" tone (lower frequency)
      currentStep--;
      renderCurrentStep();
    }
  }
  window.prevStep = prevStep;

  function jumpToStep(n) {
    if (n >= 1 && n <= TOTAL_STEPS) {
      playTone(550, 0.06);  // step-dot click — middle tone
      currentStep = n;
      renderCurrentStep();
    }
  }
  window.jumpToStep = jumpToStep;

  function markPreparationComplete() {
    try {
      const raw = localStorage.getItem(PROFILE_KEY);
      if (!raw) return;
      const profile = JSON.parse(raw);
      if (!profile.completedLessons) profile.completedLessons = [];
      if (!profile.completedLessons.includes('preparation')) {
        profile.completedLessons.push('preparation');
        profile.lastSeenAt = Date.now();
        localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
        console.log('[Preparation] Marked as completed.');
      }
    } catch (e) {
      console.warn('[Preparation] Could not update profile:', e);
    }
  }

  renderCurrentStep();
</script>
