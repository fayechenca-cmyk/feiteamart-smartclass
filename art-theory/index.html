<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEI TeamArt · Art Theory</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="../core/artchi-style.css">
<style>
  html, body { margin:0; padding:0; background:#f7f5f2; }
  .art-theory-topbar{
    display:flex; align-items:center; gap:10px;
    padding:14px 18px;
    font-family:'Montserrat', sans-serif;
  }
  .art-theory-topbar .brand-dot{
    width:10px; height:10px; border-radius:50%;
    background:#000;
  }
  .art-theory-topbar .brand-text{ font-weight:800; font-size:13px; }
  .art-theory-topbar a{
    margin-left:auto;
    text-decoration:none;
    color:#000;
    font-weight:700;
    font-size:13px;
  }
  .art-theory-wrap{
    max-width:1240px;
    margin:0 auto;
    padding:0 18px 32px;
  }
</style>
</head>
<body>

<div class="art-theory-topbar">
  <div class="brand-dot"></div>
  <div class="brand-text">FEI TeamArt</div>
  <a href="../" title="Back to Art GPS">← Back to Skills</a>
</div>

<div class="art-theory-wrap">
  <div id="fei-art-history"></div>
</div>

<!-- Artchi mascot — same character used across the rest of the platform -->
<div id="artchi-mount"></div>

<script src="../core/course-badge-registry.js"></script>
<script src="../core/art-history-platform-bridge.js"></script>
<script src="../core/scene-drawing-archi.js"></script>
<script src="curriculum.js"></script>
<script src="app.js"></script>
<script>
  document.getElementById('artchi-mount').innerHTML = artchiMarkup();
  initArtchiDrag();
  showArtchi();
</script>

</body>
</html>
